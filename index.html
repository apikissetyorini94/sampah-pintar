<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="pragma" content="no-cache"/>
<meta http-equiv="expires" content="0"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SampahPintar ♻ — UPT PLN Palembang v6</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b12;--surface:#142018;--card:#1a2d1e;--border:#263a28;
  --g1:#5dbd6a;--g2:#c9a84c;--g3:#e07050;
  --c-daun:#5dbd6a;--c-makan:#2dd4bf;
  --c-kertas:#c9a84c;--c-plastik:#5aa8d6;--c-lain:#a78bfa;
  --pln:#1e90ff;--ultg:#f59e0b;--kantor:#10b981;--ai:#7c6af7;
  --text:#d4e6d5;--muted:#7a9e7e;--white:#f0f7f1;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;overflow:hidden}
h1,h2,h3{font-family:'Syne',sans-serif}
#root{display:flex;height:100vh;overflow:hidden}
select option{background:var(--card)}
input[type=number]::-webkit-inner-spin-button{opacity:.3}

/* ══ LAYOUT UTAMA: 3 kolom ══ */
/* Kiri: sidebar navigasi sempit */
.nav-sidebar{
  width:200px;min-width:200px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;flex-shrink:0;
}
/* Tengah: panel peta/lokasi */
.map-sidebar{
  width:260px;min-width:260px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;flex-shrink:0;
}
/* Kanan: konten utama */
.main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* ── Nav sidebar ── */
.sb-logo{padding:16px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo h2{font-size:13px;font-weight:800;color:var(--g1);line-height:1.2}
.sb-logo .org{font-size:9px;color:var(--pln);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:2px}
.sb-logo .sub{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.nav-sec{padding:10px 14px 3px;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(93,189,106,.06)}
.nav-item.active{color:var(--g1);border-left-color:var(--g1);background:rgba(93,189,106,.1)}
.nav-ai.active{color:var(--ai)!important;border-left-color:var(--ai)!important;background:rgba(124,106,247,.1)!important}
.sb-stats{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.sb-stats .row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.sb-stats .val{font-weight:700;color:var(--white)}

/* ── Map sidebar (tengah) ── */
.ms-head{
  padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--card);
}
.ms-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:8px}
.ms-filter{display:flex;flex-direction:column;gap:6px}
.ms-sel{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:6px 9px;
  font-family:'DM Sans',sans-serif;font-size:11px;outline:none;cursor:pointer;
}
.ms-search{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:6px 9px;
  font-family:'DM Sans',sans-serif;font-size:11px;outline:none;
}
.ms-search::placeholder{color:var(--muted)}
.ms-list{flex:1;overflow-y:auto}
.ms-group-head{
  padding:7px 12px 3px;font-size:8px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted);display:flex;align-items:center;gap:5px;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.ms-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;cursor:pointer;
  transition:background .12s;border-left:2px solid transparent;
}
.ms-item:hover{background:rgba(255,255,255,.04)}
.ms-item.sel{background:rgba(30,144,255,.08);border-left-color:var(--pln)}
.ms-item.sel-ultg{background:rgba(245,158,11,.08);border-left-color:var(--ultg)}
.ms-dot{width:8px;height:8px;flex-shrink:0}
.ms-name{flex:1;font-size:10px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-sub{font-size:8px;color:var(--muted)}
.ms-vol{font-size:9px;font-weight:700;white-space:nowrap}
.ms-stats-bar{
  flex-shrink:0;padding:8px 12px;border-top:1px solid var(--border);
  background:var(--card);display:flex;gap:6px;flex-wrap:wrap;
}
.ms-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:600;color:var(--text)}

/* ── Main topbar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:700;color:var(--white)}
.topbar .dt{font-size:10px;color:var(--muted)}

/* ── Content area ── */
.content{padding:18px 20px;overflow-y:auto;flex:1}
.content-map{flex:1;position:relative;min-height:0;overflow:hidden}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-ai{background:linear-gradient(135deg,#1a1635 0%,#1a2d1e 100%);border-color:rgba(124,106,247,.3)}
.card-pln{background:linear-gradient(135deg,#0a1a2e 0%,#1a2d1e 100%);border-color:rgba(30,144,255,.25)}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}

/* ── Form ── */
.fld{margin-bottom:9px}
label{display:block;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 9px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--g1)}
textarea{resize:vertical}

/* ── Jenis card ── */
.jk{border-radius:9px;border:1.5px solid var(--border);overflow:hidden;transition:border-color .2s}
.jk-head{padding:7px 10px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.jk-lbl{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--jc,var(--g1))}
.jk-body{padding:7px 10px 9px;background:var(--bg)}
.jk-vrow{display:flex;align-items:baseline;gap:3px;margin-bottom:6px}
.jk-vol{flex:1;background:transparent;border:none;color:var(--white);font-family:'Syne',sans-serif;font-size:17px;font-weight:700;outline:none;padding:0;width:100%}
.jk-vol::placeholder{color:rgba(255,255,255,.12);font-size:13px}
.jk-kg{font-size:10px;color:var(--muted);flex-shrink:0}
.jk-sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 7px;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;outline:none;cursor:pointer}

/* ── Pills ── */
.pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.p-ko{background:rgba(93,189,106,.15);color:var(--g1)}
.p-bs{background:rgba(90,168,214,.15);color:#5aa8d6}
.p-tp{background:rgba(224,112,80,.15);color:var(--g3)}

/* ── Stat tile ── */
.st{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stc,var(--g1))}
.st-lbl{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.st-val{font-size:17px;font-family:'Syne',sans-serif;font-weight:700;color:var(--white)}
.st-unit{font-size:9px;color:var(--muted);margin-left:2px}

/* ── Progress ── */
.pr{margin-bottom:8px}
.pr-h{display:flex;justify-content:space-between;margin-bottom:2px;font-size:10px}
.pr-b{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pr-f{height:100%;border-radius:2px;transition:width .5s}

/* ── Table ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid rgba(38,58,40,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(93,189,106,.03)}
.tf td{background:rgba(93,189,106,.05);font-weight:700;font-size:10px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--g1);color:#0a1a0b}.btn-p:hover{background:#70d47e;transform:translateY(-1px)}
.btn-s{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-s:hover{border-color:var(--g1);color:var(--g1)}
.btn-d{background:var(--g3);color:#fff;padding:3px 8px;font-size:10px}.btn-d:hover{background:#ea8060}
.btn-pln{background:var(--pln);color:#fff}.btn-pln:hover{background:#3aa0ff;transform:translateY(-1px)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}

/* ── Infobox ── */
.ib{font-size:10px;color:var(--muted);border-radius:7px;padding:7px 10px;margin-top:8px;line-height:1.8}
.ib-g{background:rgba(93,189,106,.06);border:1px solid rgba(93,189,106,.15)}
.ib-a{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15)}
.ib-r{background:rgba(224,112,80,.08);border:1px solid rgba(224,112,80,.2);color:var(--g3)}
.ib-ai{background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.25);color:#b8aff9}
.ib-pln{background:rgba(30,144,255,.07);border:1px solid rgba(30,144,255,.2);color:#7ec8ff}

/* ── Preview ── */
.pv-box{background:rgba(93,189,106,.07);border:1px solid rgba(93,189,106,.2);border-radius:8px;padding:10px 12px;margin-bottom:11px}
.pv-title{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.pv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:7px}
.pv-lbl{font-size:8px;color:var(--muted)}
.pv-val{font-size:12px;font-family:'Syne',sans-serif;font-weight:700}
.pv-total{border-top:1px solid rgba(93,189,106,.2);padding-top:7px;display:flex;gap:12px;font-size:11px;flex-wrap:wrap}

/* ── Misc ── */
.sec-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.sec-strip{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;margin-bottom:11px;font-size:11px;font-weight:700}
.ss-org{background:rgba(93,189,106,.08);border:1px solid rgba(93,189,106,.2);color:var(--g1)}
.ss-anorg{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--g2)}
.empty{text-align:center;padding:32px;color:var(--muted)}
.empty-ic{font-size:28px;margin-bottom:8px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--g1);color:#0a1a0b;padding:8px 14px;border-radius:8px;font-weight:600;font-size:11px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;animation:su .3s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;color:#c4bbff}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--ai);animation:pulse 1.5s infinite}
.skor-ring{position:relative;width:66px;height:66px;flex-shrink:0}
.skor-svg{width:66px;height:66px;transform:rotate(-90deg)}
.skor-bg{fill:none;stroke:var(--border);stroke-width:6}
.skor-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s}
.skor-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.tren-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
.tren-up{background:rgba(224,112,80,.15);color:var(--g3)}
.tren-dn{background:rgba(93,189,106,.15);color:var(--g1)}
.tren-flat{background:rgba(201,168,76,.15);color:var(--g2)}
.reko-item{display:flex;gap:9px;padding:9px 11px;border-radius:8px;margin-bottom:8px;border:1px solid transparent}
.reko-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.reko-title{font-size:11px;font-weight:700;margin-bottom:2px}
.reko-desc{font-size:10px;color:var(--muted);line-height:1.5}
.reko-high{background:rgba(224,112,80,.08);border-color:rgba(224,112,80,.25)}.reko-high .reko-title{color:var(--g3)}
.reko-med{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.25)}.reko-med .reko-title{color:var(--g2)}
.reko-low{background:rgba(93,189,106,.08);border-color:rgba(93,189,106,.25)}.reko-low .reko-title{color:var(--g1)}
.reko-info{background:rgba(124,106,247,.08);border-color:rgba(124,106,247,.25)}.reko-info .reko-title{color:#b8aff9}
.pred-card{background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.25);border-radius:9px;padding:12px 14px;margin-bottom:10px}
.pred-header{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.pred-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#c4bbff}
.pred-sub{font-size:9px;color:var(--muted)}
.pred-val{font-size:22px;font-family:'Syne',sans-serif;font-weight:800;color:var(--white)}
.pred-note{font-size:9px;color:#9b8ff0;margin-top:3px;line-height:1.5}


/* ── Supabase / Loading ── */
.db-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.db-ok{background:rgba(93,189,106,.15);color:var(--g1)}
.db-err{background:rgba(224,112,80,.15);color:var(--g3)}
.db-loading{background:rgba(201,168,76,.15);color:var(--g2)}
.loading-overlay{position:fixed;inset:0;background:rgba(13,27,18,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:14px}
.loading-spin{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Syne',sans-serif;font-size:14px;color:var(--g1)}
.loading-sub{font-size:11px;color:var(--muted)}

/* ── Peta / Leaflet ── */
#leaflet-map{width:100%;height:100%}
.leaflet-popup-content-wrapper{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 8px 28px rgba(0,0,0,.55)!important;color:var(--text)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:14px!important;top:6px!important;right:8px!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{background:rgba(13,27,18,.85)!important;color:var(--muted)!important;font-size:8px!important}
.pop-wrap{padding:12px 14px;min-width:200px}
.pop-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px}
.pop-sub{font-size:10px;color:var(--muted);margin-bottom:8px}
.pop-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.pop-lbl{color:var(--muted)}
.pop-val{font-weight:600;color:var(--white)}
.pop-btn{width:100%;margin-top:9px;padding:6px;background:var(--g1);color:#0a1a0b;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s}
.pop-btn:hover{background:#70d47e}

/* ── Map legend ── */
.map-legend{position:absolute;bottom:24px;right:8px;z-index:400;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 11px;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.leg-i{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text);margin-bottom:3px}
.leg-i:last-child{margin:0}

/* ── Modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:10000;animation:su .2s}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:9px}
.modal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;flex-shrink:0}

/* ── Lokasi badge ── */
.lok-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.3px}

@media(max-width:900px){
  .map-sidebar{display:none}
  .g2,.g3{grid-template-columns:1fr}
  .g4,.g5{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── DATA LOKASI UPT PLN PALEMBANG ─────────────────────────────
const DATA_LOKASI = [
  // Kantor UPT
  {id:'upt',        tipe:'KANTOR', nama:'Kantor UPT Palembang',      ultg:'UPT',           kota:'Palembang', lat:-2.9476, lng:104.7673},

// Build sampahLokasi (state peta) dari records
function buildSampahLokasi(records) {
  const result = {};
  DATA_LOKASI.forEach(l => { result[l.id] = []; });
  records.forEach(r => {
    if (!r.lokasiId || !result[r.lokasiId]) return;
    const d = new Date(r.tanggal);
    const bulan = d.getMonth(), tahun = d.getFullYear();
    const existing = result[r.lokasiId].find(e => e.bulan === bulan && e.tahun === tahun);
    if (existing) {
      // Akumulasi jika ada multiple records di bulan yang sama
      JENIS.forEach(j => { existing[j.key] = String(parseFloat(existing[j.key]||0) + parseFloat(r[j.key]||0)); });
    } else {
      result[r.lokasiId].push({
        bulan, tahun,
        daun: r.daun, makan: r.makan, kertas: r.kertas, plastik: r.plastik, lain: r.lain,
        pen_daun: r.pen_daun, pen_makan: r.pen_makan,
        pen_kertas: r.pen_kertas, pen_plastik: r.pen_plastik, pen_lain: r.pen_lain,
      });
    }
  });
  // Sort tiap lokasi
  Object.keys(result).forEach(k => {
    result[k].sort((a,b) => a.tahun !== b.tahun ? a.tahun - b.tahun : a.bulan - b.bulan);
  });
  return result;
}

// ── AI Engine ──────────────────────────────────────────────────
function runAI(records){
  const byM={};
  records.forEach(r=>{
    const d=new Date(r.tanggal);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byM[k])byM[k]={org:0,anorg:0,total:0,byJenis:{},byPen:{Komposting:0,'Bank Sampah':0,TPA:0}};
    const m=byM[k];m.org+=sumGrup(r,'organik');m.anorg+=sumGrup(r,'anorganik');m.total+=sumAll(r);
    JENIS.forEach(j=>{m.byJenis[j.key]=(m.byJenis[j.key]||0)+vNum(r[j.key]);const p=r[penKey(j.key)]||'Komposting';m.byPen[p]=(m.byPen[p]||0)+vNum(r[j.key]);});
  });
  const keys=Object.keys(byM).sort(),months=keys.map(k=>byM[k]),n=months.length;
  if(!n)return null;
  const w=months.map((_,i)=>i+1),wS=w.reduce((s,x)=>s+x,0);
  const pT=months.reduce((s,m,i)=>s+m.total*w[i],0)/wS;
  const pO=months.reduce((s,m,i)=>s+m.org*w[i],0)/wS;
  const pA=months.reduce((s,m,i)=>s+m.anorg*w[i],0)/wS;
  const li=n-1;
  let tren='flat',trenPct=0;
  if(n>=2){const prev=months[li-1].total||1;trenPct=((months[li].total-prev)/prev)*100;tren=trenPct>5?'up':trenPct<-5?'down':'flat';}
  const t2=months[li].total||1;
  const tpa=(months[li].byPen.TPA||0)/t2,komp=(months[li].byPen.Komposting||0)/t2,bank=(months[li].byPen['Bank Sampah']||0)/t2;
  const skor=Math.min(100,Math.max(0,Math.round(komp*100+bank*80+(1-tpa)*20)));
  const reko=[];
  if(tpa>0.5)reko.push({level:'high',icon:'🚨',title:`TPA sangat tinggi (${(tpa*100).toFixed(0)}%)`,desc:'Tingkatkan Komposting & Bank Sampah. Target TPA < 30%.'});
  else if(tpa>0.3)reko.push({level:'med',icon:'⚠️',title:`TPA perlu dikurangi (${(tpa*100).toFixed(0)}%)`,desc:'Dorong pemilahan lebih konsisten.'});
  if(tren==='up'&&Math.abs(trenPct)>10)reko.push({level:'med',icon:'📈',title:`Timbulan naik ${trenPct.toFixed(1)}%`,desc:'Siapkan kapasitas tambahan.'});
  if(skor>=75)reko.push({level:'low',icon:'🏆',title:`Skor kinerja baik: ${skor}/100`,desc:'Pertahankan konsistensi pemilahan.'});
  if(!reko.length)reko.push({level:'info',icon:'💡',title:'Tambah data untuk analisis akurat',desc:'Input minimal 2 bulan untuk prediksi presisi.'});
  const nd=new Date(keys[li]+'-01');nd.setMonth(nd.getMonth()+1);
  return{keys,months,n,pT,pO,pA,tren,trenPct,skor,tpa,komp,bank,lastM:months[li],predLabel:BULAN_SHORT[nd.getMonth()]+' '+nd.getFullYear(),reko};
}

      []];
    const ws=XLSX.utils.aoa_to_sheet([...title,hdr,...body]);
    ws['!cols']=[10,24,18,8,10,14,10,14,10,10,14,10,14,8,14,12,9,22].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Data Harian');

    // Sheet ringkasan per lokasi
    const lokMap={};
    rows.forEach(r=>{
      const k=r.lokasiId||r.lokasiNama;
      if(!lokMap[k])lokMap[k]={nama:r.lokasiNama,ultg:r.lokasiULTG,tipe:r.lokTipe,daun:0,makan:0,kertas:0,plastik:0,lain:0,cnt:0};
      lokMap[k].daun+=vNum(r.daun);lokMap[k].makan+=vNum(r.makan);
      lokMap[k].kertas+=vNum(r.kertas);lokMap[k].plastik+=vNum(r.plastik);
      lokMap[k].lain+=vNum(r.lain);lokMap[k].cnt++;
    });
    const hdr2=['Lokasi','ULTG','Tipe','Daun(kg)','Sisa Mkn(kg)','S.Organik','Kertas(kg)','Plastik(kg)','Lain(kg)','S.Anorganik','TOTAL','Entri'];
    const body2=Object.values(lokMap).map(x=>[x.nama,x.ultg,x.tipe,x.daun,x.makan,x.daun+x.makan,x.kertas,x.plastik,x.lain,x.kertas+x.plastik+x.lain,x.daun+x.makan+x.kertas+x.plastik+x.lain,x.cnt]);
    const ws2=XLSX.utils.aoa_to_sheet([[`RINGKASAN PER LOKASI — ${nb} ${tahun}`],[],hdr2,...body2]);
    ws2['!cols']=[24,18,8,10,10,12,10,10,8,12,10,6].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws2,'Ringkasan Lokasi');

    XLSX.writeFile(wb,`SampahPintar_${nb}_${tahun}.xlsx`);
  }
}

const pPen=p=>p==='Komposting'?'p-ko':p==='Bank Sampah'?'p-bs':'p-tp';
function Pill({p}){return <span className={`pill ${pPen(p)}`}>{p}</span>;}
function Toast({msg}){return msg?<div className="toast">{msg}</div>:null;}
function St({label,value,unit,color}){return(<div className="st" style={{'--stc':color}}><div className="st-lbl">{label}</div><div className="st-val">{value}<span className="st-unit">{unit}</span></div></div>);}
function Pr({label,val,total,color,icon}){const p=total?val/total:0;return(<div className="pr"><div className="pr-h"><span style={{color,fontWeight:600}}>{icon} {label}</span><span style={{color:'var(--muted)'}}>{fmtKg(val)} ({(p*100).toFixed(1)}%)</span></div><div className="pr-b"><div className="pr-f" style={{width:`${p*100}%`,background:color}}/></div></div>);}
function MonthSel({bulan,setBulan,tahun,setTahun}){const ss={background:'var(--bg)',border:'1px solid var(--border)',borderRadius:7,color:'var(--text)',padding:'5px 9px',fontFamily:"'DM Sans',sans-serif",fontSize:11,outline:'none',width:'auto'};return(<div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}><select value={bulan} onChange={e=>setBulan(Number(e.target.value))} style={ss}>{BULAN_FULL.map((b,i)=><option key={i} value={i}>{b}</option>)}</select><select value={tahun} onChange={e=>setTahun(Number(e.target.value))} style={ss}>{TAHUN_OPT.map(y=><option key={y}>{y}</option>)}</select></div>);}
function SkorRing({skor}){const R=27,C=2*Math.PI*R,fill=C*(1-skor/100),color=skor>=75?'var(--g1)':skor>=50?'var(--g2)':'var(--g3)';return(<div className="skor-ring"><svg className="skor-svg" viewBox="0 0 66 66"><circle className="skor-bg" cx="33" cy="33" r={R}/><circle className="skor-fg" cx="33" cy="33" r={R} stroke={color} strokeDasharray={C} strokeDashoffset={fill}/></svg><div className="skor-num" style={{color}}>{skor}</div></div>);}
function JenisCard({j,form,setField}){const vol=form[j.key]||'';const pen=form[penKey(j.key)]||'Komposting';const has=vNum(vol)>0;return(<div className="jk" style={{'--jc':j.color,borderColor:has?j.color:'var(--border)'}}><div className="jk-head" style={{background:has?`${j.color}10`:'transparent'}}><div className="jk-lbl">{j.icon} {j.label}</div>{has&&<span style={{fontSize:9,fontWeight:700,color:j.color}}>{fmt(vol)}kg</span>}</div><div className="jk-body"><div className="jk-vrow"><input type="number" min="0" step="0.1" placeholder="0.0" className="jk-vol" style={{color:has?j.color:'var(--text)'}} value={vol} onChange={e=>setField(j.key,e.target.value)}/><span className="jk-kg">kg</span></div><select className="jk-sel" value={pen} onChange={e=>setField(penKey(j.key),e.target.value)} style={{borderColor:pen==='Komposting'?'rgba(93,189,106,.25)':pen==='Bank Sampah'?'rgba(90,168,214,.25)':'rgba(224,112,80,.25)'}}>{PENGELOLAAN.map(p=><option key={p}>{p}</option>)}</select></div></div>);}

// MAP SIDEBAR PANEL (kolom tengah)
// ══════════════════════════════════════════════════════════════
function MapSidebar({sampahLokasi,filterULTG,setFilterULTG,selectedId,setSelectedId,onFlyTo,onInputClick}){
  const [search,setSearch]=useState('');
  const [filterTipe,setFilterTipe]=useState('Semua');

  const filtered=useMemo(()=>DATA_LOKASI.filter(l=>{
    const u=filterULTG==='Semua'||l.ultg===filterULTG;
    const t=filterTipe==='Semua'||l.tipe===filterTipe;
    const c=!search||l.nama.toLowerCase().includes(search.toLowerCase())||l.kota.toLowerCase().includes(search.toLowerCase());
    return u&&t&&c;
  }),[filterULTG,filterTipe,search]);

  // Kelompok per ULTG
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(l=>{if(!g[l.ultg])g[l.ultg]=[];g[l.ultg].push(l);});
    return g;
  },[filtered]);

  // Stats global
  const stats=useMemo(()=>{
    let tot=0;
    DATA_LOKASI.forEach(l=>{const d=sampahLokasi[l.id];if(d&&d.length)tot+=totBulanIni(d).total;});
    return{tot,jLok:DATA_LOKASI.filter(l=>l.tipe!=='KANTOR').length};
  },[sampahLokasi]);

  return(
    <div className="map-sidebar">
      {/* Header */}
      <div className="ms-head">
        <div className="ms-title">📍 Peta GI & ULTG</div>
        <div className="ms-filter">
          <select className="ms-sel" value={filterULTG} onChange={e=>setFilterULTG(e.target.value)}>
            {ULTG_LIST.map(u=><option key={u}>{u}</option>)}
          </select>
          <select className="ms-sel" value={filterTipe} onChange={e=>setFilterTipe(e.target.value)}>
            {['Semua','GI','GIS','GITET','ULTG'].map(t=><option key={t}>{t}</option>)}
          </select>
          <input className="ms-search" placeholder="🔍 Cari lokasi / kota..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {/* Daftar lokasi per ULTG */}
      <div className="ms-list">
        {Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([uName,loks])=>{
          const warna=ULTG_WARNA[uName]||'var(--muted)';
          return(
            <div key={uName}>
              <div className="ms-group-head" style={{color:warna}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:warna,flexShrink:0}}/>
                {uName}
              </div>
              {loks.map(lok=>{
                const d=sampahLokasi[lok.id]||[];
                const stat=d.length?totBulanIni(d):{total:0};
                const isULTG=lok.tipe==='ULTG'||lok.tipe==='KANTOR';
                const sel=selectedId===lok.id;
                const mc=warnaTipe(lok.tipe);
                return(
                  <div key={lok.id}
                    className={`ms-item${sel?(isULTG?' sel-ultg':' sel'):''}`}
                    onClick={()=>{setSelectedId(lok.id);onFlyTo(lok);}}>
                    <div className="ms-dot" style={{background:mc,borderRadius:lok.tipe==='GI'?'50%':lok.tipe==='ULTG'||lok.tipe==='KANTOR'?'3px':'50%'}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="ms-name" style={{color:sel?mc:'var(--text)'}}>{lok.nama}</div>
                      <div className="ms-sub">{lok.kota} · <span style={{color:mc,fontWeight:600}}>{lok.tipe}</span></div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div className="ms-vol" style={{color:stat.total>30?'var(--g3)':stat.total>15?'var(--g2)':'var(--muted)'}}>{fmtKg(stat.total)}</div>
                      <div style={{cursor:'pointer',fontSize:9,color:'var(--pln)',fontWeight:600,marginTop:1}} onClick={e=>{e.stopPropagation();onInputClick(lok);}}>+ Input</div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Stats bar bawah */}
      <div className="ms-stats-bar">
        <span className="ms-chip">🗑 {fmtKg(stats.tot)}/bln</span>
        <span className="ms-chip" style={{color:'var(--pln)'}}>⚡ {stats.jLok} titik</span>
        <span className="ms-chip" style={{color:'var(--ultg)'}}>🏢 {DATA_LOKASI.filter(l=>l.tipe==='ULTG').length} ULTG</span>
      </div>
    </div>
  );
}

// HALAMAN PETA (konten kanan) — dengan toggle Normal/Dark mode
// ══════════════════════════════════════════════════════════════

// Tile layer options
const MAP_TILES = {
  dark: {
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    label: '🌙 Dark',
    attr: '© OpenStreetMap © CARTO',
  },
  normal: {
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    label: '☀️ Normal',
    attr: '© OpenStreetMap contributors',
  },
  satellite: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    label: '🛰 Satelit',
    attr: '© Esri © DigitalGlobe',
  },
};

function PagePeta({sampahLokasi,setSampahLokasi,showToast,filterULTG,selectedId,setSelectedId,onInputClick}){
  const leafRef   = useRef(null);
  const markersRef= useRef({});
  const tileRef   = useRef(null);
  const [mapMode, setMapMode] = useState('dark');

  // Init map sekali
  useEffect(()=>{
    if(leafRef.current)return;
    const L=window.L;
    const map=L.map('leaflet-map',{center:[-2.98,104.76],zoom:11});

    // Default tile: dark
    const tile=L.tileLayer(MAP_TILES.dark.url,{
      attribution: MAP_TILES.dark.attr,
      subdomains:'abcd',maxZoom:19
    }).addTo(map);
    tileRef.current=tile;
    leafRef.current=map;

    DATA_LOKASI.forEach(lok=>{
      const c=warnaTipe(lok.tipe);
      const isRound=lok.tipe==='GI'||lok.tipe==='GIS'||lok.tipe==='GITET';
      const sz=lok.tipe==='KANTOR'?34:lok.tipe==='ULTG'?30:26;
      const rad=isRound?'50%':'7px';
      const icon=L.divIcon({
        className:'',
        html:`<div style="width:${sz}px;height:${sz}px;border-radius:${rad};background:${c};border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:${sz>28?13:10}px;cursor:pointer;box-shadow:0 3px 10px ${c}88;transition:transform .2s" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">${iconTipe(lok.tipe)}</div>`,
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
      });
      const stat={total:0,org:0,anorg:0}; // Data real dari DB ditampilkan di panel
      const marker=L.marker([lok.lat,lok.lng],{icon}).addTo(map);
      marker.bindPopup(`
        <div class="pop-wrap">
          <div class="pop-name">${iconTipe(lok.tipe)} ${lok.nama}</div>
          <div class="pop-sub">${lok.kota} &nbsp;·&nbsp; ${lok.tipe} &nbsp;·&nbsp; ${lok.ultg}</div>
          <div class="pop-row"><span class="pop-lbl">Volume/bulan</span><span class="pop-val">${fmtKg(stat.total)}</span></div>
          <div class="pop-row"><span class="pop-lbl">Organik</span><span class="pop-val">${fmtKg(stat.org||0)}</span></div>
          <div class="pop-row"><span class="pop-lbl">Anorganik</span><span class="pop-val">${fmtKg(stat.anorg||0)}</span></div>
          <button class="pop-btn" onclick="window._inputLok&&window._inputLok('${lok.id}')">📥 Input Data Sampah</button>
        </div>
      `,{maxWidth:240});
      marker.on('click',()=>setSelectedId(lok.id));
      markersRef.current[lok.id]=marker;
    });

    window._inputLok=(id)=>{
      const l=DATA_LOKASI.find(x=>x.id===id);
      if(l)onInputClick(l);
    };
    return()=>{if(leafRef.current){leafRef.current.remove();leafRef.current=null;}};
  },[]);

  // Ganti tile saat mapMode berubah
  useEffect(()=>{
    if(!leafRef.current||!tileRef.current)return;
    const L=window.L;
    const cfg=MAP_TILES[mapMode];
    leafRef.current.removeLayer(tileRef.current);
    const newTile=L.tileLayer(cfg.url,{
      attribution:cfg.attr,
      subdomains:'abcd',maxZoom:19
    }).addTo(leafRef.current);
    // pastikan tile di bawah marker
    newTile.setZIndex(0);
    tileRef.current=newTile;
  },[mapMode]);

  // Fly to selected
  useEffect(()=>{
    if(!selectedId||!leafRef.current)return;
    const lok=DATA_LOKASI.find(l=>l.id===selectedId);
    if(lok){
      leafRef.current.setView([lok.lat,lok.lng],14,{animate:true});
      const m=markersRef.current[lok.id];
      if(m)m.openPopup();
    }
  },[selectedId]);

  // Filter visibility
  useEffect(()=>{
    if(!leafRef.current)return;
    DATA_LOKASI.forEach(lok=>{
      const m=markersRef.current[lok.id];
      if(!m)return;
      const visible=filterULTG==='Semua'||lok.ultg===filterULTG;
      if(visible){if(!leafRef.current.hasLayer(m))m.addTo(leafRef.current);}
      else{if(leafRef.current.hasLayer(m))m.remove();}
    });
  },[filterULTG]);

  return(
    <div className="content-map">
      <div id="leaflet-map"/>

      {/* ── Toggle Normal / Dark / Satelit ── */}
      <div style={{
        position:'absolute',top:10,right:10,zIndex:900,
        display:'flex',gap:4,
        background:'rgba(20,32,24,.92)',
        border:'1px solid var(--border)',
        borderRadius:10,padding:4,
        boxShadow:'0 4px 16px rgba(0,0,0,.4)',
        backdropFilter:'blur(8px)',
      }}>
        {Object.entries(MAP_TILES).map(([key,cfg])=>(
          <button key={key} onClick={()=>setMapMode(key)}
            style={{
              padding:'5px 11px',borderRadius:7,border:'none',
              fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:700,
              cursor:'pointer',transition:'all .2s',
              background: mapMode===key
                ? (key==='dark'?'#1e3a4a':key==='normal'?'#2a7a3a':'#1a3a5a')
                : 'transparent',
              color: mapMode===key
                ? (key==='dark'?'#7ec8ff':key==='normal'?'#5dbd6a':'#a8d8ff')
                : 'var(--muted)',
              boxShadow: mapMode===key?'0 2px 8px rgba(0,0,0,.3)':'none',
            }}>
            {cfg.label}
          </button>
        ))}
      </div>

      {/* ── Legenda ── */}
      <div className="map-legend">
        <div style={{fontSize:8,fontWeight:700,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>LEGENDA</div>
        {[
          {c:'#10b981',r:false,l:'Kantor UPT'},
          {c:'#f59e0b',r:false,l:'ULTG'},
          {c:'#1e90ff',r:true, l:'GI'},
          {c:'#8b5cf6',r:true, l:'GIS'},
          {c:'#ec4899',r:true, l:'GITET'},
        ].map(x=>(
          <div key={x.l} className="leg-i">
            <div style={{width:9,height:9,background:x.c,borderRadius:x.r?'50%':'3px',border:'1.5px solid rgba(255,255,255,.3)',flexShrink:0}}/>
            {x.l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// MODAL INPUT SAMPAH PER LOKASI
// ══════════════════════════════════════════════════════════════
function ModalInput({lok,sampahLokasi,setSampahLokasi,addRecord,showToast,onClose}){
  const [bulan,setBulan]=useState(TODAY.getMonth());
  const [tahun,setTahun]=useState(TODAY.getFullYear());
  const existing=useMemo(()=>{
    const d=sampahLokasi[lok.id]||[];
    return d.find(e=>e.bulan===bulan&&e.tahun===tahun)||{};
  },[sampahLokasi,lok.id,bulan,tahun]);
  const [form,setForm]=useState({...existing});

  useEffect(()=>{
    const d=sampahLokasi[lok.id]||[];
    const found=d.find(e=>e.bulan===bulan&&e.tahun===tahun)||{};
    setForm({...found});
  },[bulan,tahun]);

  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const [mSaving,setMSaving]=useState(false);
  async function save(){
    if(sumAll(form)===0){showToast('⚠️ Isi minimal satu jenis sampah');return;}
    setMSaving(true);
    // Buat tanggal dari bulan/tahun (gunakan tgl 1)
    const tgl=`${tahun}-${String(bulan+1).padStart(2,'0')}-01`;
    const entry={
      ...form,
      tanggal:tgl,
      lokasiId:lok.id,
      lokasiNama:lok.nama,
      lokasiULTG:lok.ultg,
      lokTipe:lok.tipe,
      pen_daun:form.pen_daun||'Komposting',
      pen_makan:form.pen_makan||'Komposting',
      pen_kertas:form.pen_kertas||'Bank Sampah',
      pen_plastik:form.pen_plastik||'Bank Sampah',
      pen_lain:form.pen_lain||'TPA',
    };
    const ok = await addRecord(entry);
    setMSaving(false);
    if(ok){
      showToast(`✅ Data ${lok.nama} tersimpan ke database!`);
      onClose();
    }
  }

  const tOrg=sumGrup(form,'organik'),tAnorg=sumGrup(form,'anorganik');

  return(
    <div className="modal-ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box">
        <div className="modal-head">
          <div>
            <div className="modal-title">{iconTipe(lok.tipe)} {lok.nama}</div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>
              {lok.kota} &nbsp;·&nbsp;
              <span style={{color:warnaTipe(lok.tipe),fontWeight:700}}>{lok.tipe}</span>
              &nbsp;·&nbsp; {lok.ultg}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* Pilih periode */}
        <div className="g2" style={{marginBottom:12}}>
          <div><label>Bulan</label>
            <select value={bulan} onChange={e=>setBulan(Number(e.target.value))}>
              {BULAN_FULL.map((b,i)=><option key={i} value={i}>{b}</option>)}
            </select>
          </div>
          <div><label>Tahun</label>
            <select value={tahun} onChange={e=>setTahun(Number(e.target.value))}>
              {TAHUN_OPT.map(y=><option key={y}>{y}</option>)}
            </select>
          </div>
        </div>

        {/* Organik */}
        <div style={{padding:'10px 11px',background:'rgba(93,189,106,.05)',border:'1px solid rgba(93,189,106,.15)',borderRadius:8,marginBottom:9}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--g1)',marginBottom:8,letterSpacing:.5,textTransform:'uppercase'}}>🌿 Sampah Organik {tOrg>0&&<span style={{fontWeight:700,color:'var(--g1)'}}>— {fmtKg(tOrg)}</span>}</div>
          <div className="g2">{JENIS_ORG.map(j=><JenisCard key={j.key} j={j} form={form} setField={setF}/>)}</div>
        </div>

        {/* Anorganik */}
        <div style={{padding:'10px 11px',background:'rgba(201,168,76,.05)',border:'1px solid rgba(201,168,76,.15)',borderRadius:8,marginBottom:12}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--g2)',marginBottom:8,letterSpacing:.5,textTransform:'uppercase'}}>🧴 Sampah Anorganik {tAnorg>0&&<span style={{fontWeight:700,color:'var(--g2)'}}>— {fmtKg(tAnorg)}</span>}</div>
          <div className="g3">{JENIS_ANORG.map(j=><JenisCard key={j.key} j={j} form={form} setField={setF}/>)}</div>
        </div>

        {/* Preview */}
        {sumAll(form)>0&&(
          <div style={{background:'rgba(93,189,106,.07)',border:'1px solid rgba(93,189,106,.2)',borderRadius:7,padding:'8px 10px',marginBottom:11,fontSize:11,display:'flex',gap:14,flexWrap:'wrap'}}>
            🌿 <strong style={{color:'var(--g1)'}}>{fmtKg(tOrg)}</strong>
            🧴 <strong style={{color:'var(--g2)'}}>{fmtKg(tAnorg)}</strong>
            📦 Total: <strong style={{color:'var(--white)'}}>{fmtKg(sumAll(form))}</strong>
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-p" onClick={save} disabled={mSaving} style={{opacity:mSaving?.7:1}}>{mSaving?'⏳ Menyimpan...':'✓ Simpan Data'}</button>
          <button className="btn btn-s" onClick={onClose} disabled={mSaving}>Batal</button>
        </div>
      </div>
    </div>
  );
}

// PAGE: INPUT HARIAN — 1 form dengan dropdown lokasi

function PageInput({records,addRecord,sampahLokasi,setSampahLokasi,showToast}){
  const [lokId,  setLokId ]=useState(DATA_LOKASI[0].id);
  const [tanggal,setTanggal]=useState(TODAY.toISOString().split('T')[0]);

          <div className="pv-box">
            <div className="pv-title">Pratinjau — {selLok?.nama} · {tanggal}</div>
            <div className="pv-grid">
              {JENIS.filter(j=>vNum(form[j.key])>0).map(j=>(
                <div key={j.key}>
                  <div className="pv-lbl">{j.icon} {j.label}</div>
                  <div className="pv-val" style={{color:j.color}}>{fmtKg(form[j.key])}</div>

          {icon:'🌿',name:'Sheet 8.PLM-OR',desc:'Sampah Organik — Daun & Sisa Makanan, per tanggal, per lokasi'},
          {icon:'🧴',name:'Sheet 8.PLM-ANOR',desc:'Sampah Anorganik — Kertas, Plastik, Lain-Lain, per tanggal'},
        ].map(x=>(
          <div key={x.name} style={{display:'flex',gap:8,marginBottom:6}}>
            <span>{x.icon}</span>
            <div>
              <span style={{fontWeight:700,color:'var(--white)'}}>{x.name}</span>
              <span style={{color:'var(--muted)',marginLeft:6}}>{x.desc}</span>
            </div>
          </div>
        ))}
        <div style={{marginTop:6,padding:'5px 8px',background:'rgba(30,144,255,.12)',borderRadius:5,color:'#89b4fa',fontSize:9}}>
          ℹ️ Kolom: Nama Kegiatan | Sub Jenis | Tanggal | Bulan | Tahun | Jenis Sampah | Jumlah (Kg) | Program Pengurangan | Jml Dikurangi | Program Pemanfaatan | Jml Dimanfaatkan | Kompos
        </div>
      </div>
      {f.length===0
        ?<div className="ib ib-r">⚠ Tidak ada data untuk bulan ini.</div>
        :<button className="btn btn-p" style={{width:'100%',fontSize:12}} onClick={()=>doExport('pln')}>
          ⬇ Unduh Template PLN — FR-K3L-PLH-13
        </button>
      }
    </div>

    {/* Opsi 2: Format Internal */}
    <div className="card" style={{borderColor:'rgba(93,189,106,.25)'}}>
      <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:10}}>
        <span style={{fontSize:22}}>📊</span>
        <div>
          <div className="card-title" style={{marginBottom:3}}>Format Internal SampahPintar</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>Laporan analitik lengkap dengan ringkasan per lokasi</div>
        </div>
      </div>
      <div style={{padding:'8px 10px',background:'rgba(93,189,106,.07)',borderRadius:7,marginBottom:10,fontSize:10}}>
        {[
          {icon:'📋',name:'Sheet Data Harian',desc:'Semua entri + kolom pengelolaan + total per baris'},
          {icon:'📍',name:'Sheet Ringkasan Lokasi',desc:'Akumulasi per GI/ULTG — total organik, anorganik, grand total'},
        ].map(x=>(
          <div key={x.name} style={{display:'flex',gap:8,marginBottom:6}}>
            <span>{x.icon}</span>
            <div>
              <span style={{fontWeight:700,color:'var(--white)'}}>{x.name}</span>
              <span style={{color:'var(--muted)',marginLeft:6}}>{x.desc}</span>
            </div>
          </div>
        ))}
      </div>
      {f.length===0
        ?<div className="ib ib-r">⚠ Tidak ada data untuk bulan ini.</div>
        :<button className="btn" style={{width:'100%',fontSize:12,background:'rgba(93,189,106,.15)',color:'var(--g1)',border:'1px solid rgba(93,189,106,.3)'}} onClick={()=>doExport('internal')}>
          ⬇ Unduh Laporan SampahPintar
        </button>
      }
    </div>
  </>);
}

// ══════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════
const NAV=[
  {id:'peta',    icon:'🗺',  label:'Dashboard Peta',   peta:true},
  {id:'input',   icon:'📥',  label:'Input Harian'},
  {id:'data',    icon:'📋',  label:'Data Tersimpan'},
  {id:'laporan', icon:'📊',  label:'Laporan Bulanan'},
  {id:'ai',      icon:'🤖',  label:'AI & Prediksi',   ai:true},
  {id:'ekspor',  icon:'📤',  label:'Ekspor Excel'},
];
const PAGE_TITLE={
  peta:'Dashboard — Sampah Pintar PLN UPT Palembang',
  input:'📥 Input Timbulan Harian',
  data:'📋 Data Tersimpan',
  laporan:'📊 Laporan Bulanan',
  ai:'🤖 AI Analisis & Prediksi',
  ekspor:'📤 Ekspor Spreadsheet',
};

function App(){
  const [page,      setPage]      = useState('peta');
  const [records,   setRecords]   = useState([]);
  const [sampahLok, setSampahLok] = useState({});
  const [toast,     setToast]     = useState(null);
  const [filterULTG,setFilterULTG]= useState('Semua');
  const [selectedId,setSelectedId]= useState(null);
  const [modalLok,  setModalLok]  = useState(null);
  const [dbStatus,  setDbStatus]  = useState('loading'); // loading | ok | error
  const [appLoading,setAppLoading]= useState(true);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 3000); };

  // ── Load data dari Supabase saat pertama buka ──
  useEffect(()=>{
    (async()=>{
      try {
        setDbStatus('loading');
        const recs = await dbLoadRecords();
        setRecords(recs);
        setSampahLok(buildSampahLokasi(recs));
        setDbStatus('ok');
      } catch(e) {
        console.error('DB load error:', e);
        setDbStatus('error');
        showToast('⚠️ Gagal memuat data dari server. Periksa koneksi internet.');
      } finally {
        setAppLoading(false);
      }
    })();
  }, []);

  // ── Simpan record baru ke DB ──
  async function addRecord(entry) {
    try {
      const dbId = await dbInsertRecord(entry);
      const newEntry = { ...entry, id: dbId };
      setRecords(r => [newEntry, ...r]);
      setSampahLok(buildSampahLokasi([newEntry, ...records]));
      return true;
    } catch(e) {
      console.error('Insert error:', e);
      showToast('⚠️ Gagal menyimpan ke database. Periksa koneksi internet.');
      return false;
    }
  }

  // ── Hapus record dari DB ──
  async function deleteRecord(id) {
    try {
      await dbDeleteRecord(id);
      const newRecs = records.filter(x => x.id !== id);
      setRecords(newRecs);
      setSampahLok(buildSampahLokasi(newRecs));
      showToast('🗑 Data berhasil dihapus');
    } catch(e) {
      showToast('⚠️ Gagal menghapus data. Periksa koneksi internet.');
    }
  }

  const onFlyTo   = lok => { setPage('peta'); setSelectedId(lok.id); };
  const openInput = lok => setModalLok(lok);
  const isPeta    = page === 'peta';

  if (appLoading) return(
    <div className="loading-overlay">
      <div className="loading-spin"/>
      <div className="loading-txt">♻ SampahPintar</div>
      <div className="loading-sub">Memuat data dari server...</div>
    </div>
  );

  return(
    <>
      {/* KOLOM 1: Navigasi */}
      <div className="nav-sidebar">
        <div className="sb-logo">
          <h2>♻ SampahPintar</h2>
          <div className="org">UPT PLN Palembang</div>
          <div className="sub">Waste Management System</div>
        </div>
        <div className="nav-sec">Menu Utama</div>
        {NAV.map(n=>(
          <div key={n.id}
            className={`nav-item${page===n.id?' active':''}${n.ai?' nav-ai':''}`}
            onClick={()=>setPage(n.id)}>
            <span style={{fontSize:14}}>{n.icon}</span>{n.label}
            {n.ai&&<span style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'var(--ai)',animation:'pulse 1.5s infinite',flexShrink:0}}/>}
            {n.peta&&<span style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:'var(--pln)',animation:'pulse 1.5s infinite',flexShrink:0}}/>}
          </div>
        ))}
        <div className="sb-stats">
          {[
            {l:'Total Lokasi', v:`${DATA_LOKASI.length}`, c:'var(--white)'},
            {l:'ULTG',         v:'4',                     c:'var(--ultg)'},
            {l:'GI/GIS/GITET', v:`${DATA_LOKASI.filter(l=>l.tipe!=='ULTG'&&l.tipe!=='KANTOR').length}`, c:'var(--pln)'},
            {l:'Data Tersimpan',v:records.length,         c:'var(--g1)'},
          ].map(x=>(
            <div key={x.l} className="row">
              <span style={{color:'var(--muted)'}}>{x.l}</span>
              <span className="val" style={{color:x.c}}>{x.v}</span>
            </div>
          ))}
          <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
            <span className={`db-badge ${dbStatus==='ok'?'db-ok':dbStatus==='error'?'db-err':'db-loading'}`}>
              {dbStatus==='ok'?'🟢 Database OK':dbStatus==='error'?'🔴 Offline':'🟡 Menghubungkan...'}
            </span>
          </div>
        </div>
      </div>

      {/* KOLOM 2: Map sidebar */}
      <MapSidebar
        sampahLokasi={sampahLok}
        filterULTG={filterULTG}
        setFilterULTG={setFilterULTG}
        selectedId={selectedId}
        setSelectedId={setSelectedId}
        onFlyTo={onFlyTo}
        onInputClick={openInput}
      />

      {/* KOLOM 3: Konten utama */}
      <div className="main-area">
        <div className="topbar">
          <h1>{PAGE_TITLE[page]}</h1>
          <span className="dt">{TODAY.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
        </div>

        {isPeta
          ?<PagePeta
              sampahLokasi={sampahLok}
              setSampahLokasi={setSampahLok}
              showToast={showToast}
              filterULTG={filterULTG}
              selectedId={selectedId}
              setSelectedId={setSelectedId}
              onInputClick={openInput}
            />
          :<div className="content">
            {page==='input'   &&<PageInput   records={records} addRecord={addRecord} sampahLokasi={sampahLok} setSampahLokasi={setSampahLok} showToast={showToast}/>}
            {page==='data'    &&<PageData    records={records} onDelete={deleteRecord}/>}
            {page==='laporan' &&<PageLaporan records={records}/>}
            {page==='ai'      &&<PageAI      records={records}/>}
            {page==='ekspor'  &&<PageEkspor  records={records} showToast={showToast}/>}
          </div>
        }
      </div>

      {/* Modal input per lokasi */}
      {modalLok&&(
        <ModalInput
          lok={modalLok}
          sampahLokasi={sampahLok}
          setSampahLokasi={setSampahLok}
          addRecord={addRecord}
          showToast={showToast}
          onClose={()=>setModalLok(null)}
        />
      )}

      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
