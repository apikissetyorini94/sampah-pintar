<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SampahPintar ♻</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1a10;--surface:#162118;--card:#1e2d20;--border:#2a3e2c;
  --accent1:#5dbd6a;--accent2:#c9a84c;--accent3:#e07050;--blue:#5aa8d6;
  --purple:#a78bfa;--teal:#2dd4bf;
  --text:#d4e6d5;--muted:#7a9e7e;--white:#f0f7f1;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
#root{display:flex;min-height:100vh}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
select option{background:var(--card)}

/* Sidebar */
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sidebar-logo h2{font-size:15px;font-weight:800;color:var(--accent1);line-height:1.2}
.sidebar-logo span{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(93,189,106,.06)}
.nav-item.active{color:var(--accent1);border-left-color:var(--accent1);background:rgba(93,189,106,.1)}
.nav-icon{font-size:16px}
.sidebar-footer{margin-top:auto;padding:20px;border-top:1px solid var(--border)}
.sidebar-footer .label{font-size:11px;color:var(--muted)}
.sidebar-footer .count{font-size:20px;font-family:'Syne',sans-serif;font-weight:700;color:var(--accent1)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:var(--white)}
.topbar .date{font-size:12px;color:var(--muted)}
.content{padding:24px 28px;overflow-y:auto;flex:1}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:18px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:16px;display:flex;align-items:center;gap:10px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}

/* Form */
.field{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent1)}
textarea{resize:vertical}

/* Jenis input row */
.jenis-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px}
.jenis-field{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color .2s}
.jenis-field:focus-within{border-color:var(--accent1)}
.jenis-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.jenis-input{width:100%;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;outline:none;padding:0}
.jenis-unit{font-size:10px;color:var(--muted);margin-top:2px}

/* Jenis anorganik row - 3 kolom */
.anorg-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent1);color:#0a1a0b}
.btn-primary:hover{background:#70d47e;transform:translateY(-1px)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent1);color:var(--accent1)}
.btn-danger{background:var(--accent3);color:#fff;padding:5px 11px;font-size:12px}
.btn-danger:hover{background:#ea8060}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}

/* Badge */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase}
.badge-green{background:rgba(93,189,106,.15);color:var(--accent1)}
.badge-amber{background:rgba(201,168,76,.15);color:var(--accent2)}
.badge-blue{background:rgba(90,168,214,.15);color:var(--blue)}
.badge-purple{background:rgba(167,139,250,.15);color:var(--purple)}
.badge-teal{background:rgba(45,212,191,.15);color:var(--teal)}

/* Pill pengelolaan */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.pill-kompos{background:rgba(93,189,106,.15);color:var(--accent1)}
.pill-bank{background:rgba(90,168,214,.15);color:var(--blue)}
.pill-tpa{background:rgba(224,112,80,.15);color:var(--accent3)}

/* Pill jenis sampah */
.jenis-pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;margin:1px}
.jp-daun{background:rgba(93,189,106,.15);color:var(--accent1)}
.jp-makan{background:rgba(45,212,191,.15);color:var(--teal)}
.jp-kertas{background:rgba(201,168,76,.15);color:var(--accent2)}
.jp-plastik{background:rgba(90,168,214,.15);color:var(--blue)}
.jp-lain{background:rgba(167,139,250,.15);color:var(--purple)}

/* Stat tile */
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.st-green::before{background:var(--accent1)}
.st-amber::before{background:var(--accent2)}
.st-blue::before{background:var(--blue)}
.st-red::before{background:var(--accent3)}
.st-teal::before{background:var(--teal)}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.stat-value{font-size:21px;font-family:'Syne',sans-serif;font-weight:700;color:var(--white)}
.stat-unit{font-size:12px;color:var(--muted);margin-left:3px}

/* Progress */
.prog-row{margin-bottom:12px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid rgba(42,62,44,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(93,189,106,.03)}

/* Info box */
.infobox{font-size:12px;color:var(--muted);border-radius:8px;padding:10px 12px;margin-top:10px;line-height:1.8}
.infobox-green{background:rgba(93,189,106,.06);border:1px solid rgba(93,189,106,.15)}
.infobox-amber{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15)}
.infobox-red{background:rgba(224,112,80,.08);border:1px solid rgba(224,112,80,.2);color:var(--accent3)}

/* Preview */
.preview{background:rgba(93,189,106,.07);border:1px solid rgba(93,189,106,.2);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.preview-title{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preview-item{font-size:12px}
.preview-item .pv{font-weight:700;font-size:14px}
.preview-total{margin-top:8px;padding-top:8px;border-top:1px solid rgba(93,189,106,.2);font-size:13px;font-weight:600}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-stack{display:flex;flex-direction:column;justify-content:flex-end;height:70px;gap:1px;width:100%}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar-val{font-size:9px;color:var(--muted)}
.bar-lbl{font-size:9px;color:var(--muted);white-space:nowrap}

/* Section title */
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent1);color:#0a1a0b;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Divider */
hr{border:none;border-top:1px solid var(--border);margin:6px 0 16px}

/* Sheet list */
.sheet-item{display:flex;gap:12px;margin-bottom:12px}
.sheet-icon{font-size:20px;flex-shrink:0}
.sheet-name{font-weight:600;color:var(--white);font-size:13px}
.sheet-desc{font-size:12px;color:var(--muted)}

/* Subtotal row in table */
.subtotal-row td{background:rgba(93,189,106,.05);font-weight:600;font-size:11px;color:var(--muted)}

@media(max-width:768px){
  .sidebar{display:none}
  .grid2,.jenis-row,.anorg-row{grid-template-columns:1fr}
  .grid4,.grid5{grid-template-columns:1fr 1fr}
  .grid3{grid-template-columns:1fr 1fr}
  .content{padding:14px}
  .topbar{padding:12px 16px}
  .preview-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Constants ───────────────────────────────────────────────
const BULAN_FULL = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const PENGELOLAAN = ["Komposting","Bank Sampah","TPA"];
const TODAY = new Date();
const TAHUN_OPT = [2024,2025,2026,2027];

// Jenis sampah organik
const JENIS_ORGANIK = [
  { key:'daun',   label:'Daun',         icon:'🍃', color:'var(--accent1)', cls:'jp-daun'  },
  { key:'makan',  label:'Sisa Makanan', icon:'🍱', color:'var(--teal)',    cls:'jp-makan' },
];

// Jenis sampah anorganik
const JENIS_ANORGANIK = [
  { key:'kertas',  label:'Kertas/Kardus',        icon:'📦', color:'var(--accent2)', cls:'jp-kertas'  },
  { key:'plastik', label:'Plastik (Botol/Kantong)', icon:'🧴', color:'var(--blue)',    cls:'jp-plastik' },
  { key:'lain',    label:'Lain-lain (Kaca/Besi)', icon:'🔩', color:'var(--purple)',  cls:'jp-lain'    },
];

const ALL_JENIS = [...JENIS_ORGANIK, ...JENIS_ANORGANIK];

function fmt(n){ return Number(n||0).toFixed(2); }
function fmtKg(n){ return `${fmt(n)} kg`; }
function sumOrganik(r){ return (+r.daun||0)+(+r.makan||0); }
function sumAnorganik(r){ return (+r.kertas||0)+(+r.plastik||0)+(+r.lain||0); }
function sumTotal(r){ return sumOrganik(r)+sumAnorganik(r); }

// ── Excel Export ─────────────────────────────────────────────
function exportExcel(records, bulanIdx, tahun){
  const XLSX = window.XLSX;
  const namaBulan = BULAN_FULL[bulanIdx];
  const wb = XLSX.utils.book_new();

  const rows = records
    .filter(r=>{ const d=new Date(r.tanggal); return d.getMonth()===bulanIdx&&d.getFullYear()===tahun; })
    .sort((a,b)=>a.tanggal.localeCompare(b.tanggal));

  // ── Sheet 1: Data Harian Detail ──
  const s1 = [
    [`LAPORAN DATA HARIAN SAMPAH — ${namaBulan} ${tahun}`],
    [`Dicetak: ${new Date().toLocaleDateString('id-ID')}`],
    [],
    ['Tanggal',
     'Daun (kg)','Sisa Makanan (kg)','Total Organik (kg)',
     'Kertas/Kardus (kg)','Plastik (kg)','Lain-lain (kg)','Total Anorganik (kg)',
     'Total Keseluruhan (kg)',
     'Kelola Organik','Kelola Anorganik','Keterangan'],
    ...rows.map(r=>[
      r.tanggal,
      +r.daun||0, +r.makan||0, sumOrganik(r),
      +r.kertas||0, +r.plastik||0, +r.lain||0, sumAnorganik(r),
      sumTotal(r),
      r.pengelolaan_organik, r.pengelolaan_anorganik, r.keterangan||''
    ]),
    [],
    ['TOTAL','','','','','','','','','','',''],
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(s1);
  const ds=5, de=ds+rows.length-1;
  if(rows.length>0){
    ['B','C','D','E','F','G','H','I'].forEach(col=>{
      ws1[`${col}${de+2}`]={f:`SUM(${col}${ds}:${col}${de})`,t:'n'};
    });
  }
  ws1['!cols']=[12,14,18,16,18,14,16,18,18,18,18,24].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'Data Harian');

  // ── Sheet 2: Rekap Per Jenis ──
  const totDaun   = rows.reduce((s,r)=>s+(+r.daun||0),0);
  const totMakan  = rows.reduce((s,r)=>s+(+r.makan||0),0);
  const totKertas = rows.reduce((s,r)=>s+(+r.kertas||0),0);
  const totPlastik= rows.reduce((s,r)=>s+(+r.plastik||0),0);
  const totLain   = rows.reduce((s,r)=>s+(+r.lain||0),0);
  const totOrg    = totDaun+totMakan;
  const totAnorg  = totKertas+totPlastik+totLain;
  const totAll    = totOrg+totAnorg;

  const pct = (v,t) => t ? `${(v/t*100).toFixed(1)}%` : '0%';

  const s2 = [
    [`REKAP PER JENIS SAMPAH — ${namaBulan} ${tahun}`],[],
    ['A. SAMPAH ORGANIK'],
    ['Jenis','Volume (kg)','% dari Organik','% dari Total'],
    ['Daun',              totDaun.toFixed(2),   pct(totDaun,totOrg),   pct(totDaun,totAll)],
    ['Sisa Makanan',      totMakan.toFixed(2),  pct(totMakan,totOrg),  pct(totMakan,totAll)],
    ['TOTAL ORGANIK',     totOrg.toFixed(2),    '100%',                pct(totOrg,totAll)],
    [],
    ['B. SAMPAH ANORGANIK'],
    ['Jenis','Volume (kg)','% dari Anorganik','% dari Total'],
    ['Kertas/Kardus',          totKertas.toFixed(2),  pct(totKertas,totAnorg),  pct(totKertas,totAll)],
    ['Plastik (Botol/Kantong)',totPlastik.toFixed(2), pct(totPlastik,totAnorg), pct(totPlastik,totAll)],
    ['Lain-lain (Kaca/Besi)',  totLain.toFixed(2),    pct(totLain,totAnorg),    pct(totLain,totAll)],
    ['TOTAL ANORGANIK',        totAnorg.toFixed(2),   '100%',                   pct(totAnorg,totAll)],
    [],
    ['TOTAL KESELURUHAN', totAll.toFixed(2),'','100%'],
  ];
  const ws2=XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[28,14,18,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws2,'Rekap Per Jenis');

  // ── Sheet 3: Rekap Pengelolaan ──
  const byP={Komposting:0,'Bank Sampah':0,TPA:0};
  rows.forEach(r=>{
    byP[r.pengelolaan_organik]=(byP[r.pengelolaan_organik]||0)+sumOrganik(r);
    byP[r.pengelolaan_anorganik]=(byP[r.pengelolaan_anorganik]||0)+sumAnorganik(r);
  });
  const s3=[
    [`REKAP PENGELOLAAN SAMPAH — ${namaBulan} ${tahun}`],[],
    ['Metode','Volume (kg)','Persentase'],
    ...PENGELOLAAN.map(p=>[p,(byP[p]||0).toFixed(2), pct(byP[p]||0,totAll)]),
    [],['Total',totAll.toFixed(2),'100%'],
  ];
  const ws3=XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[24,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws3,'Rekap Pengelolaan');

  // ── Sheet 4: Laporan Bulanan Formal ──
  const s4=[
    ['LAPORAN BULANAN PENGELOLAAN SAMPAH'],
    [`Periode: ${namaBulan} ${tahun}`],
    [`Dicetak: ${new Date().toLocaleDateString('id-ID')}`],[],
    ['A. TIMBULAN SAMPAH ORGANIK'],
    ['Jenis','Volume (kg)','Persentase'],
    ['Daun',totDaun.toFixed(2),pct(totDaun,totOrg)],
    ['Sisa Makanan',totMakan.toFixed(2),pct(totMakan,totOrg)],
    ['Sub-total Organik',totOrg.toFixed(2),pct(totOrg,totAll)],[],
    ['B. TIMBULAN SAMPAH ANORGANIK'],
    ['Jenis','Volume (kg)','Persentase'],
    ['Kertas/Kardus',totKertas.toFixed(2),pct(totKertas,totAnorg)],
    ['Plastik (Botol/Kantong)',totPlastik.toFixed(2),pct(totPlastik,totAnorg)],
    ['Lain-lain (Kaca/Besi)',totLain.toFixed(2),pct(totLain,totAnorg)],
    ['Sub-total Anorganik',totAnorg.toFixed(2),pct(totAnorg,totAll)],[],
    ['TOTAL KESELURUHAN',totAll.toFixed(2),'100%'],[],
    ['C. METODE PENGELOLAAN'],
    ['Metode','Volume (kg)','Persentase'],
    ...PENGELOLAAN.map(p=>[p,(byP[p]||0).toFixed(2),pct(byP[p]||0,totAll)]),
    [],[`D. STATISTIK OPERASIONAL`],
    ['Hari Pencatatan',rows.length,'hari'],
    ['Rata-rata Harian',rows.length?(totAll/rows.length).toFixed(2):0,'kg/hari'],
    ['Puncak Organik',rows.length?Math.max(...rows.map(r=>sumOrganik(r))).toFixed(2):0,'kg'],
    ['Puncak Anorganik',rows.length?Math.max(...rows.map(r=>sumAnorganik(r))).toFixed(2):0,'kg'],
  ];
  const ws4=XLSX.utils.aoa_to_sheet(s4);
  ws4['!cols']=[32,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws4,'Laporan Bulanan');

  XLSX.writeFile(wb,`Laporan_Sampah_${namaBulan}_${tahun}.xlsx`);
}

// ── Sub-components ────────────────────────────────────────
function Pill({p}){
  const cls=p==='Komposting'?'pill-kompos':p==='Bank Sampah'?'pill-bank':'pill-tpa';
  return <span className={`pill ${cls}`}>{p}</span>;
}
function JenisPill({k}){
  const j=ALL_JENIS.find(x=>x.key===k);
  if(!j) return null;
  return <span className={`jenis-pill ${j.cls}`}>{j.icon} {j.label}</span>;
}
function Toast({msg}){ return msg?<div className="toast">{msg}</div>:null; }
function StatTile({label,value,unit,cls}){
  return(
    <div className={`stat-tile ${cls}`}>
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}<span className="stat-unit">{unit}</span></div>
    </div>
  );
}
function ProgRow({label,val,total,color,icon}){
  const pct=total?val/total:0;
  return(
    <div className="prog-row">
      <div className="prog-header">
        <span style={{color,fontWeight:600}}>{icon} {label}</span>
        <span style={{color:'var(--muted)'}}>{fmtKg(val)} ({(pct*100).toFixed(1)}%)</span>
      </div>
      <div className="prog-bar"><div className="prog-fill" style={{width:`${pct*100}%`,background:color}}/></div>
    </div>
  );
}
function MonthSelector({bulan,setBulan,tahun,setTahun}){
  const ss={background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',padding:'7px 12px',fontFamily:"'DM Sans',sans-serif",fontSize:13,outline:'none',width:'auto'};
  return(
    <div style={{display:'flex',gap:10,marginBottom:18,alignItems:'center'}}>
      <select value={bulan} onChange={e=>setBulan(Number(e.target.value))} style={ss}>
        {BULAN_FULL.map((b,i)=><option key={i} value={i}>{b}</option>)}
      </select>
      <select value={tahun} onChange={e=>setTahun(Number(e.target.value))} style={ss}>
        {TAHUN_OPT.map(y=><option key={y}>{y}</option>)}
      </select>
    </div>
  );
}

function PageData({records,onDelete}){
  const [bulan,setBulan]=useState(TODAY.getMonth());
  const [tahun,setTahun]=useState(TODAY.getFullYear());
  const filtered=records
    .filter(r=>{const d=new Date(r.tanggal);return d.getMonth()===bulan&&d.getFullYear()===tahun;})
    .sort((a,b)=>a.tanggal.localeCompare(b.tanggal));

  const totals = {
    daun:   filtered.reduce((s,r)=>s+(+r.daun||0),0),
    makan:  filtered.reduce((s,r)=>s+(+r.makan||0),0),

    plastik:filtered.reduce((s,r)=>s+(+r.plastik||0),0),

// ── Page: Laporan ──────────────────────────────────────────
function PageLaporan({records}){
  const [bulan,setBulan]=useState(TODAY.getMonth());
  const [tahun,setTahun]=useState(TODAY.getFullYear());
  const filtered=records
    .filter(r=>{const d=new Date(r.tanggal);return d.getMonth()===bulan&&d.getFullYear()===tahun;})
    .sort((a,b)=>a.tanggal.localeCompare(b.tanggal));

  const totDaun   =filtered.reduce((s,r)=>s+(+r.daun||0),0);
  const totMakan  =filtered.reduce((s,r)=>s+(+r.makan||0),0);
  const totKertas =filtered.reduce((s,r)=>s+(+r.kertas||0),0);
  const totPlastik=filtered.reduce((s,r)=>s+(+r.plastik||0),0);
  const totLain   =filtered.reduce((s,r)=>s+(+r.lain||0),0);
  const totOrg    =totDaun+totMakan;
  const totAnorg  =totKertas+totPlastik+totLain;
  const tot       =totOrg+totAnorg;
  const avg       =filtered.length?tot/filtered.length:0;

  const byP={Komposting:0,'Bank Sampah':0,TPA:0};
  filtered.forEach(r=>{
    byP[r.pengelolaan_organik]=(byP[r.pengelolaan_organik]||0)+sumOrganik(r);
    byP[r.pengelolaan_anorganik]=(byP[r.pengelolaan_anorganik]||0)+sumAnorganik(r);
  });

  const last7=[...filtered].slice(-7);
  const maxB=Math.max(...last7.map(r=>sumTotal(r)),1);

  return(
    <>
      <MonthSelector bulan={bulan} setBulan={setBulan} tahun={tahun} setTahun={setTahun}/>
      <div className="sec-title">Ringkasan — {BULAN_FULL[bulan]} {tahun}</div>

      {/* Stat tiles */}
      <div className="grid5">
        <StatTile label="Total Sampah"    value={fmt(tot)}           unit="kg"    cls="st-green"/>
        <StatTile label="Rata-rata Harian" value={fmt(avg)}          unit="kg/hr" cls="st-amber"/>
        <StatTile label="Hari Pencatatan" value={filtered.length}    unit="hari"  cls="st-blue"/>
        <StatTile label="Total Organik"   value={fmt(totOrg)}        unit="kg"    cls="st-teal"/>
        <StatTile label="Ke TPA"          value={fmt(byP['TPA'])}    unit="kg"    cls="st-red"/>
      </div>

      <div className="grid2">
        {/* Organik breakdown */}
        <div className="card">
          <div className="sec-title">🌿 Rincian Sampah Organik</div>
          <ProgRow label="Daun"         val={totDaun}  total={totOrg} color="var(--accent1)" icon="🍃"/>
          <ProgRow label="Sisa Makanan" val={totMakan} total={totOrg} color="var(--teal)"    icon="🍱"/>
          <div style={{marginTop:12,padding:'8px 12px',background:'rgba(93,189,106,.06)',borderRadius:8,fontSize:12,display:'flex',justifyContent:'space-between'}}>
            <span style={{color:'var(--muted)'}}>Sub-total Organik</span>
            <strong style={{color:'var(--accent1)'}}>{fmtKg(totOrg)}</strong>
          </div>
        </div>

        {/* Anorganik breakdown */}
        <div className="card">
          <div className="sec-title">🧴 Rincian Sampah Anorganik</div>
          <ProgRow label="Kertas/Kardus"        val={totKertas}  total={totAnorg} color="var(--accent2)" icon="📦"/>
          <ProgRow label="Plastik (Botol/Kantong)" val={totPlastik} total={totAnorg} color="var(--blue)"    icon="🧴"/>
          <ProgRow label="Lain-lain (Kaca/Besi)"  val={totLain}    total={totAnorg} color="var(--purple)"  icon="🔩"/>
          <div style={{marginTop:12,padding:'8px 12px',background:'rgba(201,168,76,.06)',borderRadius:8,fontSize:12,display:'flex',justifyContent:'space-between'}}>
            <span style={{color:'var(--muted)'}}>Sub-total Anorganik</span>
            <strong style={{color:'var(--accent2)'}}>{fmtKg(totAnorg)}</strong>
          </div>
        </div>
      </div>

      <div className="grid2">
        {/* Komposisi total */}
        <div className="card">
          <div className="sec-title">Komposisi Keseluruhan</div>
          <ProgRow label="Organik"   val={totOrg}   total={tot} color="var(--accent1)" icon="🌿"/>
          <ProgRow label="Anorganik" val={totAnorg} total={tot} color="var(--accent2)" icon="🧴"/>
        </div>

        {/* Metode pengelolaan */}
        <div className="card">
          <div className="sec-title">Metode Pengelolaan</div>
          <ProgRow label="Komposting"  val={byP['Komposting']}  total={tot} color="var(--accent1)" icon="♻"/>
          <ProgRow label="Bank Sampah" val={byP['Bank Sampah']} total={tot} color="var(--blue)"    icon="🏦"/>
          <ProgRow label="TPA"         val={byP['TPA']}         total={tot} color="var(--accent3)" icon="🗑"/>
        </div>
      </div>

      {/* Bar chart tren */}
      {last7.length>0&&(
        <div className="card">
          <div className="sec-title">Tren 7 Entri Terakhir</div>
          <div className="bar-chart">
            {last7.map((r,i)=>{
              const org=sumOrganik(r), anorg=sumAnorganik(r), total=org+anorg;
              const ho=Math.max((org/maxB)*66,2);
              const ha=Math.max((anorg/maxB)*66,2);
              return(
                <div key={i} className="bar-col">
                  <span className="bar-val">{fmt(total)}</span>
                  <div className="bar-stack">
                    <div className="bar" style={{height:ho,background:'var(--accent1)'}}/>
                    <div className="bar" style={{height:ha,background:'var(--accent2)'}}/>
                  </div>
                  <span className="bar-lbl">{new Date(r.tanggal).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:14,marginTop:8,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'var(--accent1)'}}>■ Organik</span>
            <span style={{fontSize:11,color:'var(--accent2)'}}>■ Anorganik</span>
          </div>
        </div>
      )}
    </>
  );
}

function PageEkspor({records,showToast}){

  const tot=filtered.reduce((s,r)=>s+sumTotal(r),0);
  const sheets=[
    {icon:'📋',name:'Sheet 1: Data Harian',      desc:'Entri harian detail per jenis sampah + formula total otomatis'},
    {icon:'📊',name:'Sheet 2: Rekap Per Jenis',   desc:'Ringkasan Daun, Sisa Makanan, Kertas, Plastik, Lain-lain + persentase'},

            <div style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} entri · {fmtKg(tot)} total</div>

        <div style={{background:'rgba(0,0,0,.2)',borderRadius:10,padding:'14px 16px',marginBottom:18}}>
          <div className="sec-title">Isi File Excel (.xlsx) — 4 Sheet</div>
          {sheets.map(x=>(
            <div key={x.name} className="sheet-item">
              <span className="sheet-icon">{x.icon}</span>

                <div className="sheet-name">{x.name}</div>
                <div className="sheet-desc">{x.desc}</div>
              </div>
            </div>
          ))}
        </div>
        {filtered.length===0?(
          <div className="infobox infobox-red">⚠ Tidak ada data untuk periode ini.</div>
        ):(
          <button className="btn btn-primary" style={{fontSize:14,padding:'11px 22px'}} onClick={()=>{
            try{ exportExcel(records,bulan,tahun); showToast('✅ Laporan Excel berhasil diunduh!'); }

      <div className="card">
        <div className="sec-title">Tips Penggunaan</div>
        <div style={{fontSize:13,color:'var(--muted)',lineHeight:2}}>
          📌 Isi semua jenis sampah yang tersedia setiap harinya<br/>
          📌 Jenis yang tidak ada biarkan kosong / 0 — tidak akan mempengaruhi total<br/>
          📌 Ekspor di akhir bulan untuk pengarsipan rutin<br/>
          📌 File .xlsx bisa langsung dibuka di Microsoft Excel atau Google Sheets<br/>
          📌 Data tersimpan di sesi browser — ekspor sebelum menutup halaman
        </div>
      </div>
    </>
  );
}

  const [form,setForm]=useState({...EMPTY_FORM});

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2800);};
  const setField=(k,v)=>setForm(f=>({...f,[k]:v}));

  const onSubmit=()=>{
    if(!form.tanggal){ showToast('⚠️ Pilih tanggal terlebih dahulu'); return; }
    const totOrg=(+form.daun||0)+(+form.makan||0);
    const totAnorg=(+form.kertas||0)+(+form.plastik||0)+(+form.lain||0);
    if(totOrg===0 && totAnorg===0){ showToast('⚠️ Isi minimal satu jenis sampah'); return; }
    setRecords(r=>[...r,{...form,id:Date.now()}]);
    setForm({...EMPTY_FORM,tanggal:form.tanggal});
    showToast('✅ Data berhasil disimpan!');
  };
  const onReset=()=>setForm({...EMPTY_FORM,tanggal:form.tanggal});
  const onDelete=id=>{setRecords(r=>r.filter(x=>x.id!==id));showToast('🗑 Data dihapus');};

  return(
    <>
      <div className="sidebar">
        <div className="sidebar-logo">
          <h2>♻ SampahPintar</h2>
          <span>Waste Management</span>
        </div>
        {NAV.map(n=>(
          <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="label">Total data tersimpan</div>
          <div className="count">{records.length}<span style={{fontSize:12}}> entri</span></div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <h1>{PAGE_TITLE[page]}</h1>
          <span className="date">{TODAY.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
        </div>
        <div className="content">
          {page==='input'   && <PageInput   form={form} setField={setField} onSubmit={onSubmit} onReset={onReset}/>}
          {page==='data'    && <PageData    records={records} onDelete={onDelete}/>}
          {page==='laporan' && <PageLaporan records={records}/>}
          {page==='ekspor'  && <PageEkspor  records={records} showToast={showToast}/>}
        </div>
      </div>
      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
