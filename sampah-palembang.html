<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SampahPintar ♻ — UPT PLN Palembang</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b12;--surface:#142018;--card:#1a2d1e;--border:#263a28;
  --g1:#5dbd6a;--g2:#c9a84c;--g3:#e07050;
  --c-daun:#5dbd6a;--c-makan:#2dd4bf;
  --c-kertas:#c9a84c;--c-plastik:#5aa8d6;--c-lain:#a78bfa;
  --pln:#1e90ff;--ultg:#f59e0b;--kantor:#10b981;
  --ai:#7c6af7;
  --text:#d4e6d5;--muted:#7a9e7e;--white:#f0f7f1;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Syne',sans-serif}
#root{display:flex;min-height:100vh}
select option{background:var(--card)}
input[type=number]::-webkit-inner-spin-button{opacity:.3}

/* Sidebar */
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:0 18px 18px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sb-logo h2{font-size:14px;font-weight:800;color:var(--g1);line-height:1.2}
.sb-logo .sub1{font-size:10px;color:var(--pln);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.sb-logo .sub2{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(93,189,106,.06)}
.nav-item.active{color:var(--g1);border-left-color:var(--g1);background:rgba(93,189,106,.1)}
.nav-peta.active{color:var(--pln)!important;border-left-color:var(--pln)!important;background:rgba(30,144,255,.1)!important}
.nav-ai.active{color:var(--ai)!important;border-left-color:var(--ai)!important;background:rgba(124,106,247,.1)!important}
.nav-section{padding:8px 18px 4px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.sb-foot{margin-top:auto;padding:16px 18px;border-top:1px solid var(--border)}
.sb-foot .lbl{font-size:10px;color:var(--muted)}
.sb-foot .cnt{font-size:18px;font-family:'Syne',sans-serif;font-weight:700;color:var(--g1)}

/* Layout */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;position:sticky;top:0}
.topbar h1{font-size:16px;font-weight:700;color:var(--white)}
.topbar .dt{font-size:11px;color:var(--muted)}
.content{padding:20px 24px;overflow-y:auto;flex:1}
.content-peta{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;margin-bottom:14px}
.card-ai{background:linear-gradient(135deg,#1a1635 0%,#1a2d1e 100%);border-color:rgba(124,106,247,.3)}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:16px}

/* Form */
.fld{margin-bottom:10px}
label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--g1)}
textarea{resize:vertical}

/* Jenis card */
.jk{border-radius:10px;border:1.5px solid var(--border);overflow:hidden;transition:border-color .2s}
.jk-head{padding:8px 12px 7px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.jk-icon-lbl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--jc,var(--g1))}
.jk-body{padding:8px 12px 10px;background:var(--bg)}
.jk-vol-row{display:flex;align-items:baseline;gap:3px;margin-bottom:7px}
.jk-vol{flex:1;background:transparent;border:none;color:var(--white);font-family:'Syne',sans-serif;font-size:18px;font-weight:700;outline:none;padding:0;width:100%}
.jk-vol::placeholder{color:rgba(255,255,255,.15);font-size:14px}
.jk-kg{font-size:11px;color:var(--muted);flex-shrink:0}
.jk-sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;outline:none;cursor:pointer}

/* Pills */
.pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.p-ko{background:rgba(93,189,106,.15);color:var(--g1)}
.p-bs{background:rgba(90,168,214,.15);color:#5aa8d6}
.p-tp{background:rgba(224,112,80,.15);color:var(--g3)}

/* Stat tile */
.st{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stc,var(--g1))}
.st-lbl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.st-val{font-size:19px;font-family:'Syne',sans-serif;font-weight:700;color:var(--white)}
.st-unit{font-size:10px;color:var(--muted);margin-left:2px}

/* Progress */
.pr{margin-bottom:9px}
.pr-h{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.pr-b{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pr-f{height:100%;border-radius:2px;transition:width .5s}

/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 9px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px 9px;border-bottom:1px solid rgba(38,58,40,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(93,189,106,.03)}
.tf td{background:rgba(93,189,106,.05);font-weight:700;font-size:10px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--g1);color:#0a1a0b}.btn-p:hover{background:#70d47e;transform:translateY(-1px)}
.btn-s{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-s:hover{border-color:var(--g1);color:var(--g1)}
.btn-d{background:var(--g3);color:#fff;padding:3px 9px;font-size:10px}.btn-d:hover{background:#ea8060}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

/* Infobox */
.ib{font-size:11px;color:var(--muted);border-radius:7px;padding:7px 11px;margin-top:8px;line-height:1.8}
.ib-g{background:rgba(93,189,106,.06);border:1px solid rgba(93,189,106,.15)}
.ib-a{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15)}
.ib-r{background:rgba(224,112,80,.08);border:1px solid rgba(224,112,80,.2);color:var(--g3)}
.ib-ai{background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.25);color:#b8aff9}

/* Preview */
.pv-box{background:rgba(93,189,106,.07);border:1px solid rgba(93,189,106,.2);border-radius:9px;padding:10px 12px;margin-bottom:12px}
.pv-title{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.pv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.pv-item .pv-lbl{font-size:9px;color:var(--muted)}
.pv-item .pv-val{font-size:13px;font-family:'Syne',sans-serif;font-weight:700}
.pv-total{border-top:1px solid rgba(93,189,106,.2);padding-top:7px;display:flex;gap:14px;font-size:12px;flex-wrap:wrap}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.sec-strip{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:12px;font-size:12px;font-weight:700}
.ss-org{background:rgba(93,189,106,.08);border:1px solid rgba(93,189,106,.2);color:var(--g1)}
.ss-anorg{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--g2)}
.empty{text-align:center;padding:36px;color:var(--muted)}
.empty-ic{font-size:32px;margin-bottom:8px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--g1);color:#0a1a0b;padding:9px 16px;border-radius:9px;font-weight:600;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;animation:su .3s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;color:#c4bbff}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--ai);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.skor-ring{position:relative;width:72px;height:72px;flex-shrink:0}
.skor-svg{width:72px;height:72px;transform:rotate(-90deg)}
.skor-bg{fill:none;stroke:var(--border);stroke-width:7}
.skor-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .8s}
.skor-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.tren-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tren-up{background:rgba(224,112,80,.15);color:var(--g3)}
.tren-dn{background:rgba(93,189,106,.15);color:var(--g1)}
.tren-flat{background:rgba(201,168,76,.15);color:var(--g2)}
.reko-item{display:flex;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:9px;border:1px solid transparent}
.reko-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.reko-title{font-size:12px;font-weight:700;margin-bottom:2px}
.reko-desc{font-size:11px;color:var(--muted);line-height:1.5}
.reko-high{background:rgba(224,112,80,.08);border-color:rgba(224,112,80,.25)}.reko-high .reko-title{color:var(--g3)}
.reko-med{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.25)}.reko-med .reko-title{color:var(--g2)}
.reko-low{background:rgba(93,189,106,.08);border-color:rgba(93,189,106,.25)}.reko-low .reko-title{color:var(--g1)}
.reko-info{background:rgba(124,106,247,.08);border-color:rgba(124,106,247,.25)}.reko-info .reko-title{color:#b8aff9}
.pred-card{background:rgba(124,106,247,.08);border:1px solid rgba(124,106,247,.25);border-radius:10px;padding:13px 15px;margin-bottom:12px}
.pred-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pred-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#c4bbff}
.pred-sub{font-size:10px;color:var(--muted)}
.pred-val{font-size:24px;font-family:'Syne',sans-serif;font-weight:800;color:var(--white)}
.pred-note{font-size:10px;color:#9b8ff0;margin-top:4px;line-height:1.5}
.sl{display:flex;gap:10px;margin-bottom:10px}
.sl-nm{font-weight:600;color:var(--white);font-size:12px}
.sl-ds{font-size:10px;color:var(--muted)}

/* ══ PETA ══ */
.map-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
#map-container{flex:1;position:relative;min-height:0}
#leaflet-map{width:100%;height:100%}

.leaflet-popup-content-wrapper{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:11px!important;box-shadow:0 8px 28px rgba(0,0,0,.55)!important;color:var(--text)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:auto!important;max-width:280px}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:16px!important;top:7px!important;right:9px!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--surface)!important}
.leaflet-control-attribution{background:rgba(13,27,18,.85)!important;color:var(--muted)!important;font-size:9px!important}

.map-filter-sel{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;outline:none;cursor:pointer}
.map-search{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;outline:none;flex:1;min-width:120px;max-width:200px}
.map-search::placeholder{color:var(--muted)}
.map-chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--text);white-space:nowrap}

/* Left panel lokasi */
.loc-panel{position:absolute;top:0;left:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:400;display:flex;flex-direction:column}
.loc-panel-head{padding:10px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;flex-shrink:0}
.loc-item{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;transition:background .15s;margin:2px 6px;border-radius:8px;border:1px solid transparent}
.loc-item:hover{background:rgba(93,189,106,.06)}
.loc-item.sel{background:rgba(30,144,255,.08);border-color:rgba(30,144,255,.2)}
.loc-item.ultg-item:hover{background:rgba(245,158,11,.06)}
.loc-item.ultg-item.sel{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2)}
.loc-item.kantor-item:hover{background:rgba(16,185,129,.06)}
.loc-item.kantor-item.sel{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
.loc-dot{width:9px;height:9px;flex-shrink:0}
.loc-name{flex:1;font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc-sub{font-size:9px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc-vol{font-size:10px;font-weight:700;white-space:nowrap}
.loc-group-head{padding:8px 12px 4px;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-top:4px}

/* Right detail panel */
.detail-panel{position:absolute;top:0;right:0;bottom:0;width:300px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;z-index:400;transform:translateX(100%);transition:transform .3s}
.detail-panel.open{transform:translateX(0)}
.dp-head{background:var(--card);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:1}
.dp-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.dp-body{padding:14px}

/* Legend */
.map-legend{position:absolute;bottom:28px;right:8px;z-index:400;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;box-shadow:0 4px 14px rgba(0,0,0,.3);min-width:150px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text);margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:10000;animation:su .2s}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--white)}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0;flex-shrink:0}

/* Dropdown UPT pilihan */
.upt-select-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.upt-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--white);padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;outline:none;cursor:pointer;min-width:220px}

@media(max-width:800px){
  .sidebar{display:none}
  .g2,.g3{grid-template-columns:1fr}
  .g4,.g5{grid-template-columns:1fr 1fr}
  .loc-panel{display:none}
  .detail-panel{width:100%;top:auto;height:55%}
  .content{padding:12px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── Data lokasi NYATA UPT PLN Palembang ──────────────────────
// Koordinat berdasarkan lokasi nyata di Google Maps
const DATA_LOKASI = [
  // ── KANTOR UPT ──
  { id:'upt-plm',   tipe:'KANTOR', nama:'Kantor UPT Palembang',    ultg:'UPT',              kota:'Palembang', lat:-2.9476, lng:104.7673, warna:'#10b981' },

  // ── ULTG KERAMASAN ──
  { id:'ultg-krm',  tipe:'ULTG',   nama:'Kantor ULTG Keramasan',   ultg:'ULTG Keramasan',   kota:'Palembang', lat:-2.9918, lng:104.7321, warna:'#f59e0b' },
  { id:'gi-krm',    tipe:'GI',     nama:'GI Keramasan',            ultg:'ULTG Keramasan',   kota:'Palembang', lat:-2.9982, lng:104.7284, warna:'#1e90ff' },
  { id:'gi-bng',    tipe:'GI',     nama:'GI Bungaran',             ultg:'ULTG Keramasan',   kota:'Palembang', lat:-2.9543, lng:104.8012, warna:'#1e90ff' },
  { id:'gi-mrn',    tipe:'GI',     nama:'GI Mariana',              ultg:'ULTG Keramasan',   kota:'Banyuasin', lat:-2.9213, lng:104.8543, warna:'#1e90ff' },

// Seed dummy data
function genDummy(seed){
  const data=[];
  for(let m=2;m>=0;m--){
    const d=new Date(TODAY.getFullYear(),TODAY.getMonth()-m,1);
    const base=(seed%8+2)*1.5;
    data.push({bulan:d.getMonth(),tahun:d.getFullYear(),
      daun:   +(base*(0.7+Math.random()*.5)).toFixed(1),
      makan:  +(base*(0.5+Math.random()*.4)).toFixed(1),
      kertas: +(base*(0.3+Math.random()*.3)).toFixed(1),
      plastik:+(base*(0.4+Math.random()*.3)).toFixed(1),
      lain:   +(base*(0.15+Math.random()*.2)).toFixed(1),
      pen_daun:'Komposting',pen_makan:'TPA',
      pen_kertas:'Bank Sampah',pen_plastik:'Bank Sampah',pen_lain:'TPA',
    });
  }
  return data;
}

function totBulanIni(d){
  if(!d||d.length===0)return{total:0,org:0,anorg:0};
  const last=d[d.length-1];
  const org=sumGrup(last,'organik'),anorg=sumGrup(last,'anorganik');
  return{total:org+anorg,org,anorg,data:last};
}

// ── AI Engine ────────────────────────────────────────────────
function runAI(records){
  const byM={};
  records.forEach(r=>{
    const d=new Date(r.tanggal);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byM[k])byM[k]={org:0,anorg:0,total:0,byJenis:{},byPen:{Komposting:0,'Bank Sampah':0,TPA:0}};
    const m=byM[k];
    m.org+=sumGrup(r,'organik');m.anorg+=sumGrup(r,'anorganik');m.total+=sumAll(r);
    JENIS.forEach(j=>{m.byJenis[j.key]=(m.byJenis[j.key]||0)+vNum(r[j.key]);const p=r[penKey(j.key)]||'Komposting';m.byPen[p]=(m.byPen[p]||0)+vNum(r[j.key]);});
  });
  const keys=Object.keys(byM).sort(),months=keys.map(k=>byM[k]),n=months.length;
  if(!n)return null;
  const w=months.map((_,i)=>i+1),wS=w.reduce((s,x)=>s+x,0);
  const pT=months.reduce((s,m,i)=>s+m.total*w[i],0)/wS;
  const pO=months.reduce((s,m,i)=>s+m.org*w[i],0)/wS;
  const pA=months.reduce((s,m,i)=>s+m.anorg*w[i],0)/wS;
  const li=n-1;
  let tren='flat',trenPct=0;
  if(n>=2){const p=months[li-1].total||1;const c=months[li].total;trenPct=((c-p)/p)*100;tren=trenPct>5?'up':trenPct<-5?'down':'flat';}
  const t2=months[li].total||1;
  const tpa=(months[li].byPen.TPA||0)/t2,komp=(months[li].byPen.Komposting||0)/t2,bank=(months[li].byPen['Bank Sampah']||0)/t2;
  const skor=Math.min(100,Math.max(0,Math.round(komp*100+bank*80+(1-tpa)*20)));
  const reko=[];
  if(tpa>0.5)reko.push({level:'high',icon:'🚨',title:`TPA sangat tinggi (${(tpa*100).toFixed(0)}%)`,desc:'Tingkatkan Komposting & Bank Sampah. Target TPA < 30%.'});
  else if(tpa>0.3)reko.push({level:'med',icon:'⚠️',title:`TPA perlu dikurangi (${(tpa*100).toFixed(0)}%)`,desc:'Dorong pemilahan lebih konsisten.'});
  if(tren==='up'&&Math.abs(trenPct)>10)reko.push({level:'med',icon:'📈',title:`Timbulan naik ${trenPct.toFixed(1)}%`,desc:'Siapkan kapasitas pengelolaan tambahan.'});
  if(skor>=75)reko.push({level:'low',icon:'🏆',title:`Pengelolaan baik! Skor ${skor}/100`,desc:'Pertahankan konsistensi.'});
  if(!reko.length)reko.push({level:'info',icon:'💡',title:'Tambah data untuk analisis lebih akurat',desc:'Input minimal 2 bulan untuk prediksi lebih presisi.'});
  const nd=new Date(keys[li]+'-01');nd.setMonth(nd.getMonth()+1);
  return{keys,months,n,pT,pO,pA,tren,trenPct,skor,tpa,komp,bank,lastM:months[li],predLabel:BULAN_SHORT[nd.getMonth()]+' '+nd.getFullYear()};
}

// ── Export Excel ─────────────────────────────────────────────
function exportExcel(records,bulanIdx,tahun){
  const XLSX=window.XLSX;const nb=BULAN_FULL[bulanIdx];const wb=XLSX.utils.book_new();
  const rows=records.filter(r=>{const d=new Date(r.tanggal);return d.getMonth()===bulanIdx&&d.getFullYear()===tahun;}).sort((a,b)=>a.tanggal.localeCompare(b.tanggal));
  const hdr=['Tanggal','Daun','Pen.Daun','Sisa Mkn','Pen.Makan','Sub Org','Kertas','Pen.Kertas','Plastik','Pen.Plastik','Lain','Pen.Lain','Sub Anorg','TOTAL','Ket'];
  const body=rows.map(r=>[r.tanggal,vNum(r.daun),r.pen_daun||'-',vNum(r.makan),r.pen_makan||'-',sumGrup(r,'organik'),vNum(r.kertas),r.pen_kertas||'-',vNum(r.plastik),r.pen_plastik||'-',vNum(r.lain),r.pen_lain||'-',sumGrup(r,'anorganik'),sumAll(r),r.keterangan||'']);
  const ws1=XLSX.utils.aoa_to_sheet([[`DATA HARIAN — ${nb} ${tahun}`],[],hdr,...body]);
  ws1['!cols']=[11,8,14,11,14,10,8,14,9,14,8,14,12,9,16].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'Data Harian');
  XLSX.writeFile(wb,`Laporan_Sampah_${nb}_${tahun}.xlsx`);
}

  if(tipe==='KANTOR')return'#10b981';

  if(tipe==='GIS')return'#8b5cf6';
  if(tipe==='GITET')return'#ec4899';
  return'#1e90ff';
}
function iconTipe(tipe){
  if(tipe==='KANTOR')return'🏛';

  const [inputMonth,setInputMonth]=useState(TODAY.getMonth());

    });
  },[filterULTG,filterTipe,search]);

  const globalStats=useMemo(()=>{
    let tot=0,gi=0,ultg=0;
    DATA_LOKASI.forEach(l=>{const d=sampahLokasi[l.id];if(!d||!d.length)return;const s=totBulanIni(d);tot+=s.total;if(l.tipe==='GI'||l.tipe==='GIS'||l.tipe==='GITET')gi+=s.total;else if(l.tipe==='ULTG')ultg+=s.total;});
    return{tot,gi,ultg,jGI:DATA_LOKASI.filter(l=>l.tipe!=='ULTG'&&l.tipe!=='KANTOR').length,jULTG:DATA_LOKASI.filter(l=>l.tipe==='ULTG').length};
  },[sampahLokasi]);

  // Init map
  useEffect(()=>{
    if(leafRef.current)return;
    const L=window.L;
    const map=L.map('leaflet-map',{center:[-2.98,104.76],zoom:11,zoomControl:true});

        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
      });
      L.marker([lok.lat,lok.lng],{icon}).addTo(map).on('click',()=>{setSelected(lok.id);setPanelOpen(true);map.setView([lok.lat,lok.lng],14,{animate:true});});

  },[]);

  function flyTo(lok){setSelected(lok.id);setPanelOpen(true);if(leafRef.current)leafRef.current.setView([lok.lat,lok.lng],14,{animate:true});}

  // Simpan data dari dropdown input

              <div className="g2">{JENIS_ORG.map(j=><JenisCard key={j.key} j={j} form={inputForm} setField={(k,v)=>setInputForm(f=>({...f,[k]:v}))}/>)}</div>
            </div>

              <div className="g3">{JENIS_ANORG.map(j=><JenisCard key={j.key} j={j} form={inputForm} setField={(k,v)=>setInputForm(f=>({...f,[k]:v}))}/>)}</div>

              <div style={{background:'rgba(93,189,106,.07)',border:'1px solid rgba(93,189,106,.2)',borderRadius:7,padding:'8px 11px',marginBottom:12,fontSize:11}}>

            <div className="btn-row">
              <button className="btn btn-p" onClick={saveInputDropdown}>✓ Simpan Data</button>
              <button className="btn btn-s" onClick={()=>setModalLok(null)}>Batal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    </div>
    <div className="card">

      <div className="fld"><label>Catatan (opsional)</label><textarea rows={2} placeholder="Kondisi khusus, event, dll..." value={form.keterangan} onChange={e=>setField('keterangan',e.target.value)}/></div>

  const t={};JENIS.forEach(j=>{t[j.key]=f.reduce((s,r)=>s+vNum(r[j.key]),0);});
  const tO=JENIS_ORG.reduce((s,j)=>s+t[j.key],0),tA=JENIS_ANORG.reduce((s,j)=>s+t[j.key],0);

ey}><td style={{color:j.color}}>{fmt(t[j.key])}</td><td/></React.Fragment>)}<td style={{color:'var(--c-kertas)'}}>{fmt(tA)}</td><td style={{color:'var(--white)'}}>{fmt(tO+tA)}</td><td/></tr></tfoot></table></div>)}</div></>);
}

function PageLaporan({records}){
  const [b,setB]=useState(TODAY.getMonth());const [y,setY]=useState(TODAY.getFullYear());
  const f=records.filter(r=>{const d=new Date(r.tanggal);return d.getMonth()===b&&d.getFullYear()===y;});
  const tJ={};JENIS.forEach(j=>{tJ[j.key]=f.reduce((s,r)=>s+vNum(r[j.key]),0);});
  const tO=JENIS_ORG.reduce((s,j)=>s+tJ[j.key],0),tA=JENIS_ANORG.reduce((s,j)=>s+tJ[j.key],0),tot=tO+tA,avg=f.length?tot/f.length:0;
  const bP={Komposting:0,'Bank Sampah':0,TPA:0};f.forEach(r=>JENIS.forEach(j=>{const p=r[penKey(j.key)]||'Komposting';bP[p]=(bP[p]||0)+vNum(r[j.key]);}));
  const l7=[...f].slice(-7),mB=Math.max(...l7.map(r=>sumAll(r)),1);
  return(<><MonthSel bulan={b} setBulan={setB} tahun={y} setTahun={setY}/>
    <div className="sec-lbl">Ringkasan — {BULAN_FULL[b]} {y}</div>
    <div className="g5"><St label="Total Sampah" value={fmt(tot)} unit="kg" color="var(--g1)"/><St label="Rata-rata/Hari" value={fmt(avg)} unit="kg" color="var(--g2)"/><St label="Hari Catat" value={f.length} unit="hari" color="#5aa8d6"/><St label="Organik" value={fmt(tO)} unit="kg" color="var(--c-makan)"/><St label="Ke TPA" value={fmt(bP.TPA)} unit="kg" color="var(--g3)"/></div>
    <div className="g2"><div className="card"><div className="sec-lbl">🌿 Organik</div>{JENIS_ORG.map(j=><Pr key={j.key} label={j.label} val={tJ[j.key]} total={tO} color={j.color} icon={j.icon}/>)}</div><div className="card"><div className="sec-lbl">🧴 Anorganik</div>{JENIS_ANORG.map(j=><Pr key={j.key} label={j.label} val={tJ[j.key]} total={tA} color={j.color} icon={j.icon}/>)}</div></div>
    <div className="g2"><div className="card"><div className="sec-lbl">Komposisi</div><Pr label="Organik" val={tO} total={tot} color="var(--g1)" icon="🌿"/><Pr label="Anorganik" val={tA} total={tot} color="var(--g2)" icon="🧴"/></div><div className="card"><div className="sec-lbl">Pengelolaan</div><Pr label="Komposting" val={bP.Komposting} total={tot} color="var(--g1)" icon="♻"/><Pr label="Bank Sampah" val={bP['Bank Sampah']} total={tot} color="#5aa8d6" icon="🏦"/><Pr label="TPA" val={bP.TPA} total={tot} color="var(--g3)" icon="🗑"/></div></div>
    {l7.length>0&&(<div className="card"><div className="sec-lbl">Tren 7 Entri Terakhir</div><div style={{display:'flex',alignItems:'flex-end',gap:4,height:80,paddingTop:7}}>{l7.map((r,i)=>{const o=sumGrup(r,'organik'),a=sumGrup(r,'anorganik'),t=o+a;const ho=Math.max((o/mB)*62,2);const ha=Math.max((a/mB)*62,2);return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><span style={{fontSize:8,color:'var(--muted)'}}>{fmt(t)}</span><div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end',height:62,gap:1,width:'100%'}}><div style={{width:'100%',height:ho,background:'var(--g1)',borderRadius:'2px 2px 0 0'}}/><div style={{width:'100%',height:ha,background:'var(--g2)',borderRadius:'2px 2px 0 0'}}/></div><span style={{fontSize:7,color:'var(--muted)'}}>{new Date(r.tanggal).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span></div>);})}</div></div>)}</>);
}

function PageAI({records}){
  const ai=useMemo(()=>runAI(records),[records]);
  if(!ai)return(<div className="card card-ai"><div style={{textAlign:'center',padding:'36px 16px'}}><div style={{fontSize:40,marginBottom:12}}>🤖</div><div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,color:'var(--white)',marginBottom:6}}>Modul AI Belum Aktif</div><div style={{color:'var(--muted)',fontSize:12}}>Input data harian minimal 1 bulan terlebih dahulu.</div></div></div>);
  const {keys,months,n,pT,pO,pA,tren,trenPct,skor,tpa,komp,bank,lastM,predLabel}=ai;
  const tL=tren==='up'?`↑ +${Math.abs(trenPct).toFixed(1)}%`:tren==='down'?`↓ -${Math.abs(trenPct).toFixed(1)}%`:'→ Stabil';
  const tC=tren==='up'?'tren-up':tren==='down'?'tren-dn':'tren-flat';
  const rc=l=>l==='high'?'reko-high':l==='med'?'reko-med':l==='low'?'reko-low':'reko-info';
  const mx=Math.max(...months.map(m=>m.total),1);
  return(<>
    <div className="card card-ai"><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><div style={{fontSize:30}}>🤖</div><div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}><h2 style={{fontSize:15,fontWeight:800,color:'var(--white)'}}>AI Analisis & Prediksi</h2><span className="ai-badge"><span className="ai-dot"/>Aktif</span></div><div style={{fontSize:11,color:'var(--muted)'}}><strong style={{color:'#b8aff9'}}>{records.length} entri</strong> · <strong style={{color:'#b8aff9'}}>{n} bulan</strong></div></div><div style={{textAlign:'center'}}><div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:5}}>Skor Kinerja</div><SkorRing skor={skor}/></div></div></div>
    {n>=2&&(<div className="card"><div className="card-title">📈 Tren Bulanan <span className={`tren-badge ${tC}`} style={{marginLeft:'auto'}}>{tL}</span></div><div style={{display:'flex',alignItems:'flex-end',gap:3,height:80,paddingTop:6}}>{months.map((m,i)=>{const ho=Math.max((m.org/mx)*64,2),ha=Math.max((m.anorg/mx)*64,2);const[yr,mo]=keys[i].split('-');return(<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><span style={{fontSize:7,color:'var(--muted)'}}>{Math.round(m.total)}</span><div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end',height:64,gap:1,width:'100%'}}><div style={{height:ho,background:'var(--g1)',borderRadius:'2px 2px 0 0',width:'100%'}}/><div style={{height:ha,background:'var(--g2)',borderRadius:'2px 2px 0 0',width:'100%'}}/></div><span style={{fontSize:7,color:'var(--muted)',textAlign:'center'}}>{BULAN_SHORT[Number(mo)-1]}<br/>{yr}</span></div>);})}</div></div>)}
    <div className="card card-ai"><div className="card-title">🔮 Prediksi — {predLabel}</div><div className="g3">{[{icon:'📦',t:'Total',v:pT},{icon:'🌿',t:'Organik',v:pO},{icon:'🧴',t:'Anorganik',v:pA}].map(x=>(<div key={x.t} className="pred-card"><div className="pred-header"><span className="pred-icon" style={{fontSize:18}}>{x.icon}</span><div><div className="pred-title">{x.t}</div></div></div><div><span className="pred-val">{fmt(x.v)}</span><span className="pred-unit">kg</span></div></div>))}</div></div>
    <div className="card"><div className="card-title">💡 Rekomendasi</div>{ai.reko.map((r,i)=>(<div key={i} className={`reko-item ${rc(r.level)}`}><span className="reko-icon">{r.icon}</span><div><div className="reko-title">{r.title}</div><div className="reko-desc">{r.desc}</div></div></div>))}</div>
    <div className="card"><div className="card-title">🏆 Skor Kinerja</div><div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',marginBottom:14}}><SkorRing skor={skor}/><div style={{flex:1,fontSize:11,color:'var(--muted)',lineHeight:1.8}}>TPA: <strong style={{color:tpa>0.3?'var(--g3)':'var(--g1)'}}>{(tpa*100).toFixed(1)}%</strong> (target &lt;30%)</div></div><Pr label="Komposting" val={lastM.byPen.Komposting} total={lastM.total} color="var(--g1)" icon="♻"/><Pr label="Bank Sampah" val={lastM.byPen['Bank Sampah']} total={lastM.total} color="#5aa8d6" icon="🏦"/><Pr label="TPA" val={lastM.byPen.TPA} total={lastM.total} color="var(--g3)" icon="🗑"/></div>
  </>);
}

function PageEkspor({records,showToast}){
  const [b,setB]=useState(TODAY.getMonth());const [y,setY]=useState(TODAY.getFullYear());
  const f=records.filter(r=>{const d=new Date(r.tanggal);return d.getMonth()===b&&d.getFullYear()===y;});
  const tot=f.reduce((s,r)=>s+sumAll(r),0);
  return(<><MonthSel bulan={b} setBulan={setB} tahun={y} setTahun={setY}/>
    <div className="card" style={{borderColor:'rgba(93,189,106,.3)'}}><div style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}><span style={{fontSize:26}}>📊</span><div><div className="card-title" style={{marginBottom:1}}>Ekspor — {BULAN_FULL[b]} {y}</div><div style={{fontSize:11,color:'var(--muted)'}}>{f.length} entri · {fmtKg(tot)}</div></div></div>
      {[{icon:'📋',name:'Sheet 1: Data Harian',desc:'Semua entri per jenis + pengelolaan'},{icon:'📄',name:'Sheet 2: Laporan Bulanan',desc:'Laporan formal siap cetak & arsip'}].map(x=>(<div key={x.name} className="sl"><span>{x.icon}</span><div><div className="sl-nm">{x.name}</div><div className="sl-ds">{x.desc}</div></div></div>))}
      {f.length===0?<div className="ib ib-r">⚠ Tidak ada data.</div>:<button className="btn btn-p" style={{fontSize:13,padding:'9px 20px'}} onClick={()=>{try{exportExcel(records,b,y);showToast('✅ Excel berhasil diunduh!');}catch(e){showToast('⚠️ '+e.message);}}}>⬇ Unduh Excel (.xlsx)</button>}
    </div></>);
}

// ══════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════
const NAV=[
  {id:'peta',    icon:'🗺',  label:'Peta GI & ULTG',   peta:true},
  {id:'input',   icon:'📥',  label:'Input Harian'},
  {id:'data',    icon:'📋',  label:'Data Tersimpan'},
  {id:'laporan', icon:'📊',  label:'Laporan Bulanan'},
  {id:'ai',      icon:'🤖',  label:'AI & Prediksi',    ai:true},
  {id:'ekspor',  icon:'📤',  label:'Ekspor Excel'},
];
const PAGE_TITLE={
  peta:'🗺 Peta GI & ULTG — UPT PLN Palembang',
  input:'📥 Input Timbulan Harian',
  data:'📋 Data Tersimpan',
  laporan:'📊 Laporan Bulanan',
  ai:'🤖 AI Analisis & Prediksi',
  ekspor:'📤 Ekspor Spreadsheet',
};
const EMPTY_FORM=()=>({
  tanggal:TODAY.toISOString().split('T')[0],
  daun:'',makan:'',kertas:'',plastik:'',lain:'',
  pen_daun:'Komposting',pen_makan:'Komposting',
  pen_kertas:'Bank Sampah',pen_plastik:'Bank Sampah',pen_lain:'TPA',
  keterangan:'',
});

function App(){
  const [page,setPage]=useState('peta');
  const [records,setRecords]=useState([]);
  const [sampahLokasi,setSampahLokasi]=useState(SAMPAH_AWAL);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM());

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2800);};
  const setField=(k,v)=>setForm(f=>({...f,[k]:v}));
  const onSubmit=()=>{
    if(!form.tanggal){showToast('⚠️ Pilih tanggal');return;}
    if(sumAll(form)===0){showToast('⚠️ Isi minimal satu jenis');return;}
    setRecords(r=>[...r,{...form,id:Date.now()}]);
    setForm({...EMPTY_FORM(),tanggal:form.tanggal});
    showToast('✅ Data berhasil disimpan!');
  };
  const onReset=()=>setForm({...EMPTY_FORM(),tanggal:form.tanggal});
  const onDelete=id=>{setRecords(r=>r.filter(x=>x.id!==id));showToast('🗑 Data dihapus');};
  const isPeta=page==='peta';

  return(
    <>
      <div className="sidebar">
        <div className="sb-logo">
          <h2>♻ SampahPintar</h2>
          <div className="sub1">UPT PLN Palembang</div>
          <div className="sub2">Waste Management System</div>
        </div>
        <div className="nav-section">Menu</div>
        {NAV.map(n=>(
          <div key={n.id} className={`nav-item${page===n.id?' active':''}${n.ai?' nav-ai':''}${n.peta?' nav-peta':''}`} onClick={()=>setPage(n.id)}>
            <span style={{fontSize:15}}>{n.icon}</span>{n.label}
            {n.ai&&<span style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:'var(--ai)',animation:'pulse 1.5s infinite',flexShrink:0}}/>}
            {n.peta&&<span style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:'var(--pln)',animation:'pulse 1.5s infinite',flexShrink:0}}/>}
          </div>
        ))}
        <div className="sb-foot">
          <div className="lbl">Total lokasi terdaftar</div>
          <div className="cnt">{DATA_LOKASI.length}<span style={{fontSize:11}}> lokasi</span></div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
            {DATA_LOKASI.filter(l=>l.tipe==='ULTG').length} ULTG · {DATA_LOKASI.filter(l=>l.tipe!=='ULTG'&&l.tipe!=='KANTOR').length} GI/GIS/GITET
          </div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <h1>{PAGE_TITLE[page]}</h1>
          <span className="dt">{TODAY.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
        </div>
        {isPeta
          ?<PagePeta sampahLokasi={sampahLokasi} setSampahLokasi={setSampahLokasi} showToast={showToast}/>
          :<div className="content">
            {page==='input'   &&<PageInput   form={form} setField={setField} onSubmit={onSubmit} onReset={onReset} sampahLokasi={sampahLokasi} setSampahLokasi={setSampahLokasi} showToast={showToast}/>}
            {page==='data'    &&<PageData    records={records} onDelete={onDelete}/>}
            {page==='laporan' &&<PageLaporan records={records}/>}
            {page==='ai'      &&<PageAI      records={records}/>}
            {page==='ekspor'  &&<PageEkspor  records={records} showToast={showToast}/>}
          </div>
        }
      </div>
      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
